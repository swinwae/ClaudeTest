<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyBlog - 分享思想与代码</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <div class="container">
      <nav class="navbar">
        <a href="index.html" class="logo">
          <span class="logo-icon">&#9670;</span>
          <span class="logo-text">MyBlog</span>
        </a>
        <ul class="nav-links">
          <li><a href="index.html" class="active">首页</a></li>
          <li><a href="about.html">关于</a></li>
        </ul>
        <div class="nav-actions">
          <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索文章..." />
            <button class="search-btn" onclick="performSearch()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              </svg>
            </button>
          </div>
          <button class="theme-toggle" id="themeToggle" title="切换主题">
            <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </button>
          <button class="menu-toggle" id="menuToggle">&#9776;</button>
        </div>
      </nav>
    </div>
  </header>

  <!-- Hero -->
  <section class="hero">
    <div class="container">
      <div class="hero-content">
        <h1 class="hero-title">分享思想，记录成长</h1>
        <p class="hero-subtitle">技术 · 生活 · 思考 · 创造</p>
      </div>
    </div>
    <div class="hero-wave">
      <svg viewBox="0 0 1440 80" preserveAspectRatio="none">
        <path d="M0,40 C360,80 1080,0 1440,40 L1440,80 L0,80 Z" fill="var(--bg-primary)"/>
      </svg>
    </div>
  </section>

  <!-- Tags Filter -->
  <section class="tags-section">
    <div class="container">
      <div class="tags-filter" id="tagsFilter">
        <button class="tag-btn active" data-tag="all">全部</button>
      </div>
    </div>
  </section>

  <!-- Main Content -->
  <main class="main-content">
    <div class="container">
      <div class="content-grid">
        <!-- Posts List -->
        <section class="posts-section">
          <div id="searchResultsMsg" class="search-results-msg" style="display:none;"></div>
          <div class="posts-grid" id="postsGrid">
            <!-- Posts rendered by JS -->
          </div>
          <div class="load-more-wrapper" id="loadMoreWrapper">
            <button class="btn-load-more" id="loadMoreBtn" onclick="loadMore()">加载更多</button>
          </div>
        </section>

        <!-- Sidebar -->
        <aside class="sidebar">
          <!-- Recent Posts -->
          <div class="widget">
            <h3 class="widget-title">最新文章</h3>
            <ul class="recent-posts" id="recentPosts"></ul>
          </div>

          <!-- Tags Cloud -->
          <div class="widget">
            <h3 class="widget-title">标签云</h3>
            <div class="tags-cloud" id="tagsCloud"></div>
          </div>

          <!-- Stats -->
          <div class="widget stats-widget">
            <h3 class="widget-title">博客统计</h3>
            <div class="stats-grid">
              <div class="stat-item">
                <span class="stat-number" id="totalPosts">0</span>
                <span class="stat-label">文章</span>
              </div>
              <div class="stat-item">
                <span class="stat-number" id="totalTags">0</span>
                <span class="stat-label">标签</span>
              </div>
              <div class="stat-item">
                <span class="stat-number">2026</span>
                <span class="stat-label">创建年份</span>
              </div>
            </div>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <div class="footer-content">
        <p class="footer-logo">&#9670; MyBlog</p>
        <p class="footer-tagline">用文字记录世界</p>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 MyBlog. 用 &#10084; 构建</p>
      </div>
    </div>
  </footer>

  <script src="js/posts.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
