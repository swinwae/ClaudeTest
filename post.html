<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文章 - MyBlog</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <div class="container">
      <nav class="navbar">
        <a href="index.html" class="logo">
          <span class="logo-icon">&#9670;</span>
          <span class="logo-text">MyBlog</span>
        </a>
        <ul class="nav-links">
          <li><a href="index.html">首页</a></li>
          <li><a href="about.html">关于</a></li>
        </ul>
        <div class="nav-actions">
          <button class="theme-toggle" id="themeToggle" title="切换主题">
            <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </button>
          <button class="menu-toggle" id="menuToggle">&#9776;</button>
        </div>
      </nav>
    </div>
  </header>

  <!-- Post Content -->
  <main class="post-main">
    <div class="container">
      <div class="post-layout">
        <!-- Article -->
        <article class="article" id="articleContent">
          <!-- Rendered by JS -->
        </article>

        <!-- Sidebar -->
        <aside class="sidebar post-sidebar">
          <!-- TOC -->
          <div class="widget toc-widget" id="tocWidget">
            <h3 class="widget-title">目录</h3>
            <nav class="toc" id="toc"></nav>
          </div>

          <!-- Related Posts -->
          <div class="widget">
            <h3 class="widget-title">相关文章</h3>
            <ul class="related-posts" id="relatedPosts"></ul>
          </div>
        </aside>
      </div>
    </div>

    <!-- Back to top -->
    <button class="back-to-top" id="backToTop" title="回到顶部">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="18,15 12,9 6,15"></polyline>
      </svg>
    </button>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <div class="footer-content">
        <p class="footer-logo">&#9670; MyBlog</p>
        <p class="footer-tagline">用文字记录世界</p>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 MyBlog. 用 &#10084; 构建</p>
      </div>
    </div>
  </footer>

  <script src="js/posts.js"></script>
  <script src="js/post.js"></script>
</body>
</html>
