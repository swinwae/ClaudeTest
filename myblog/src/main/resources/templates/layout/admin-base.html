<!DOCTYPE html>
<!--
  管理后台布局片段：侧边栏导航
-->
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="zh-CN">

<!--/* ========== HEAD 片段 ========== */-->
<head th:fragment="head(title)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${title} + ' - MyBlog 管理后台'">管理后台</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" th:href="@{/css/admin.css}"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="crossorigin"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&amp;family=JetBrains+Mono:wght@400;600&amp;display=swap"
        rel="stylesheet"/>
  <script th:src="@{/js/theme.js}"></script>
</head>

<!--/* ========== 侧边栏片段 ========== */-->
<nav th:fragment="sidebar(adminSection)" class="admin-sidebar">
  <!-- 品牌 Logo -->
  <div class="admin-sidebar-header">
    <a th:href="@{/admin/dashboard}" class="admin-brand">
      <span class="admin-brand-icon">&#9670;</span>
      <div>
        <div>MyBlog</div>
        <div class="admin-brand-sub">管理后台</div>
      </div>
    </a>
  </div>

  <!-- 导航菜单 -->
  <div class="admin-nav">
    <div class="admin-nav-section">
      <div class="admin-nav-section-title">概览</div>
      <a th:href="@{/admin/dashboard}"
         th:classappend="${adminSection == 'dashboard'} ? 'active'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
        仪表盘
      </a>
    </div>

    <div class="admin-nav-section">
      <div class="admin-nav-section-title">内容管理</div>
      <a th:href="@{/admin/posts}"
         th:classappend="${adminSection == 'posts'} ? 'active'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
        文章管理
      </a>
      <a th:href="@{/admin/tags}"
         th:classappend="${adminSection == 'tags'} ? 'active'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
          <line x1="7" y1="7" x2="7.01" y2="7"></line>
        </svg>
        标签管理
      </a>
      <a th:href="@{/admin/categories}"
         th:classappend="${adminSection == 'categories'} ? 'active'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="8" y1="6" x2="21" y2="6"></line>
          <line x1="8" y1="12" x2="21" y2="12"></line>
          <line x1="8" y1="18" x2="21" y2="18"></line>
          <line x1="3" y1="6" x2="3.01" y2="6"></line>
          <line x1="3" y1="12" x2="3.01" y2="12"></line>
          <line x1="3" y1="18" x2="3.01" y2="18"></line>
        </svg>
        分类管理
      </a>
    </div>

    <div class="admin-nav-section">
      <div class="admin-nav-section-title">链接</div>
      <a th:href="@{/}" target="_blank">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
          <polyline points="15 3 21 3 21 9"></polyline>
          <line x1="10" y1="14" x2="21" y2="3"></line>
        </svg>
        查看博客
      </a>
    </div>
  </div>

  <!-- 底部用户信息 -->
  <div class="admin-sidebar-footer">
    <div class="admin-user-info">
      <div class="admin-user-avatar" sec:authentication="name">A</div>
      <div>
        <div class="admin-user-name" sec:authentication="name">管理员</div>
      </div>
    </div>
    <form th:action="@{/admin/logout}" method="post" style="margin:0;">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="admin-logout-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        退出登录
      </button>
    </form>
  </div>
</nav>

<!--/* ========== 顶部栏片段 ========== */-->
<header th:fragment="topbar(pageTitle)" class="admin-topbar">
  <h1 th:text="${pageTitle}">页面标题</h1>
  <div class="admin-topbar-actions">
    <button class="theme-toggle" id="themeToggle" title="切换主题" type="button">
      <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
      <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>
  </div>
</header>

</html>
