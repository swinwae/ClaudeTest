<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="~{layout/base :: head('首页')}"></head>
<body>

<div th:replace="~{layout/base :: header(${activePage})}"></div>

<!-- Hero 区域 -->
<section class="hero">
  <div class="container">
    <div class="hero-content">
      <h1 class="hero-title">分享思想，记录成长</h1>
      <p class="hero-subtitle">技术 · 生活 · 思考 · 创造</p>
    </div>
  </div>
  <div class="hero-wave">
    <svg viewBox="0 0 1440 80" preserveAspectRatio="none">
      <path d="M0,40 C360,80 1080,0 1440,40 L1440,80 L0,80 Z" fill="var(--bg-primary)"/>
    </svg>
  </div>
</section>

<!-- 标签筛选 -->
<section class="tags-section">
  <div class="container">
    <div class="tags-filter">
      <a th:href="@{/}"
         th:class="${currentTag == null or currentTag == ''} ? 'tag-btn active' : 'tag-btn'">全部</a>
      <a th:each="t : ${tags}"
         th:href="@{/(tag=${t.name})}"
         th:text="${t.name}"
         th:class="${currentTag == t.name} ? 'tag-btn active' : 'tag-btn'">标签</a>
    </div>
  </div>
</section>

<!-- 搜索结果提示 -->
<div th:if="${search != null and !#strings.isEmpty(search)}" class="container" style="padding-top:16px;">
  <div class="search-results-msg">
    找到 <strong th:text="${posts.totalElements}">0</strong>
    篇与"<strong th:text="${search}"></strong>"相关的文章
  </div>
</div>

<!-- 主内容区 -->
<main class="main-content">
  <div class="container">
    <div class="content-grid">

      <!-- 文章列表 -->
      <section class="posts-section">
        <!-- 无文章提示 -->
        <div th:if="${posts.content.isEmpty()}" style="padding:40px;text-align:center;color:var(--text-muted);">
          <p>暂无文章。</p>
        </div>

        <!-- 文章卡片 -->
        <div class="posts-grid">
          <div th:each="post, iterStat : ${posts.content}"
               th:class="${iterStat.index == 0 and (currentTag == null or #strings.isEmpty(currentTag)) and (search == null or #strings.isEmpty(search))} ? 'post-card featured' : 'post-card'"
               onclick="window.location.href=this.dataset.href"
               th:attr="data-href=@{/post/{id}(id=${post.id})}"
               style="cursor:pointer;">
            <!-- 封面 -->
            <div class="post-card-cover"
                 th:style="|background: linear-gradient(135deg, ${@gradientHelper.get(post.id)})|">
              <span style="position:relative;z-index:1;" th:text="${post.emoji}">📝</span>
            </div>
            <!-- 卡片内容 -->
            <div class="post-card-inner">
              <div class="post-card-body">
                <div class="post-meta">
                  <span th:if="${!post.tags.isEmpty()}"
                        class="post-meta-tag"
                        th:text="${post.tags.iterator().next().name}">标签</span>
                  <span th:text="${#temporals.format(post.publishedAt != null ? post.publishedAt : post.createdAt, 'yyyy年M月d日')}">日期</span>
                </div>
                <h2 th:text="${post.title}">文章标题</h2>
                <p th:text="${post.excerpt}">文章摘要</p>
              </div>
              <div class="post-card-footer">
                <span class="read-more">阅读全文</span>
                <span class="post-read-time" th:text="${post.readTime} + ' 分钟阅读'">5 分钟阅读</span>
              </div>
            </div>
          </div>
        </div>

        <!-- 分页 -->
        <div th:if="${posts.totalPages > 1}" class="load-more-wrapper" style="text-align:center;margin-top:32px;">
          <div style="display:inline-flex;gap:8px;align-items:center;">
            <a th:if="${posts.hasPrevious()}"
               th:href="@{/(page=${posts.number - 1}, tag=${currentTag}, search=${search})}"
               class="btn-load-more" style="padding:10px 20px;font-size:0.875rem;">← 上一页</a>
            <span style="color:var(--text-muted);font-size:0.875rem;"
                  th:text="${posts.number + 1} + ' / ' + ${posts.totalPages}">1/3</span>
            <a th:if="${posts.hasNext()}"
               th:href="@{/(page=${posts.number + 1}, tag=${currentTag}, search=${search})}"
               class="btn-load-more" style="padding:10px 20px;font-size:0.875rem;">下一页 →</a>
          </div>
        </div>
      </section>

      <!-- 侧边栏 -->
      <aside class="sidebar">
        <!-- 最新文章 -->
        <div class="widget">
          <h3 class="widget-title">最新文章</h3>
          <ul class="recent-posts">
            <li th:each="p : ${recentPosts}">
              <a th:href="@{/post/{id}(id=${p.id})}" th:text="${p.title}">文章标题</a>
              <span class="post-date"
                    th:text="${#temporals.format(p.publishedAt != null ? p.publishedAt : p.createdAt, 'yyyy-MM-dd')}">日期</span>
            </li>
          </ul>
        </div>

        <!-- 标签云 -->
        <div class="widget">
          <h3 class="widget-title">标签云</h3>
          <div class="tags-cloud">
            <a th:each="t : ${tags}"
               th:href="@{/(tag=${t.name})}"
               th:text="${t.name}"
               class="tag-cloud-item">标签</a>
          </div>
        </div>

        <!-- 博客统计 -->
        <div class="widget stats-widget">
          <h3 class="widget-title">博客统计</h3>
          <div class="stats-grid">
            <div class="stat-item">
              <span class="stat-number" th:text="${totalPosts}">0</span>
              <span class="stat-label">文章</span>
            </div>
            <div class="stat-item">
              <span class="stat-number" th:text="${totalTags}">0</span>
              <span class="stat-label">标签</span>
            </div>
            <div class="stat-item">
              <span class="stat-number">2026</span>
              <span class="stat-label">创建年份</span>
            </div>
          </div>
        </div>
      </aside>

    </div>
  </div>
</main>

<div th:replace="~{layout/base :: footer}"></div>

</body>
</html>
