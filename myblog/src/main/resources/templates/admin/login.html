<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>登录 - MyBlog 管理后台</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" th:href="@{/css/admin.css}"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="crossorigin"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&amp;family=JetBrains+Mono:wght@400;600&amp;display=swap"
        rel="stylesheet"/>
  <script th:src="@{/js/theme.js}"></script>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <!-- Logo -->
    <div class="login-header">
      <div class="login-logo">&#9670; MyBlog</div>
      <p class="login-subtitle">管理后台登录</p>
    </div>

    <!-- 错误提示 -->
    <div th:if="${errorMsg}" class="alert alert-error" style="margin-bottom:16px;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;flex-shrink:0;">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      <span th:text="${errorMsg}">错误信息</span>
    </div>

    <!-- 登录表单，POST 到 Spring Security 处理端点 -->
    <form class="login-form" th:action="@{/admin/login}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="form-field">
        <label for="username">用户名</label>
        <input type="text" id="username" name="username"
               placeholder="admin" autocomplete="username" required autofocus/>
      </div>

      <div class="form-field">
        <label for="password">密码</label>
        <input type="password" id="password" name="password"
               placeholder="••••••••" autocomplete="current-password" required/>
      </div>

      <button type="submit" class="login-submit">登录</button>
    </form>

    <div class="login-back">
      <a th:href="@{/}">← 返回博客首页</a>
    </div>

    <!-- 主题切换 -->
    <div style="text-align:center;margin-top:16px;">
      <button class="theme-toggle" id="themeToggle" title="切换主题" type="button"
              style="margin:0 auto;">
        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
        </svg>
        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
    </div>
  </div>
</div>
</body>
</html>
