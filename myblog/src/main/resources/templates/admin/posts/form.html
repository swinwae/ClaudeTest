<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="zh-CN">
<head th:replace="~{layout/admin-base :: head(${form.id == null} ? '新建文章' : '编辑文章')}"></head>
<body>
<div class="admin-layout">

  <div th:replace="~{layout/admin-base :: sidebar(${adminSection})}"></div>

  <div class="admin-main">
    <div th:replace="~{layout/admin-base :: topbar(${form.id == null} ? '新建文章' : '编辑文章')}"></div>

    <div class="admin-content">

      <!-- 表单 -->
      <form th:action="${form.id == null} ? @{/admin/posts} : @{/admin/posts/{id}(id=${form.id})}"
            th:object="${form}"
            method="post"
            class="admin-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <!-- 校验错误汇总 -->
        <div th:if="${#fields.hasErrors('*')}" class="alert alert-error">
          <span>请修正以下错误后重新提交。</span>
        </div>

        <!-- 基本信息 -->
        <div class="admin-card">
          <div class="admin-card-header">
            <span class="admin-card-title">基本信息</span>
          </div>
          <div class="admin-card-body">
            <div class="admin-form">
              <div class="form-row">
                <!-- 标题 -->
                <div class="form-field full-width">
                  <label for="title">标题 <span style="color:#ef4444;">*</span></label>
                  <input type="text" id="title" name="title"
                         th:value="${form.title}" placeholder="文章标题" required/>
                  <span class="form-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
                </div>

                <!-- Emoji -->
                <div class="form-field">
                  <label for="emoji">封面 Emoji</label>
                  <input type="text" id="emoji" name="emoji"
                         th:value="${form.emoji}" placeholder="📝" style="max-width:120px;"/>
                  <span class="form-hint">单个 Emoji 字符，用于文章封面</span>
                </div>

                <!-- 发布状态 -->
                <div class="form-field">
                  <label for="status">发布状态</label>
                  <select id="status" name="status">
                    <option value="DRAFT" th:selected="${form.status == 'DRAFT'}">草稿</option>
                    <option value="PUBLISHED" th:selected="${form.status == 'PUBLISHED'}">立即发布</option>
                  </select>
                </div>
              </div>

              <div class="form-row">
                <!-- 分类 -->
                <div class="form-field">
                  <label for="categoryId">分类</label>
                  <select id="categoryId" name="categoryId">
                    <option value="">无分类</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"
                            th:selected="${form.categoryId == cat.id}">分类名</option>
                  </select>
                </div>

                <!-- 标签 -->
                <div class="form-field">
                  <label for="tagNames">标签</label>
                  <input type="text" id="tagNames" name="tagNames"
                         th:value="${form.tagNames}"
                         placeholder="Java,Spring,后端（逗号分隔）"/>
                  <span class="form-hint">多个标签用英文逗号分隔，新标签会自动创建</span>
                </div>
              </div>

              <!-- 摘要 -->
              <div class="form-field">
                <label for="excerpt">摘要</label>
                <textarea id="excerpt" name="excerpt" rows="3"
                          placeholder="文章摘要（显示在列表页，不填则留空）"
                          th:text="${form.excerpt}"></textarea>
              </div>
            </div>
          </div>
        </div>

        <!-- Markdown 编辑器 + 预览 -->
        <div class="admin-card">
          <div class="admin-card-header">
            <span class="admin-card-title">内容（Markdown）</span>
            <span style="font-size:0.8rem;color:var(--text-muted);">实时预览</span>
          </div>
          <div class="admin-card-body">
            <div class="md-editor-container">
              <!-- 编辑区 -->
              <div class="md-editor-pane">
                <label>编辑</label>
                <textarea id="mdContent" name="content"
                          class="form-field"
                          style="flex:1;min-height:500px;"
                          th:text="${form.content}"
                          placeholder="在此输入 Markdown 内容..."></textarea>
                <span class="form-error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></span>
              </div>
              <!-- 预览区 -->
              <div class="md-editor-pane">
                <label>预览</label>
                <div class="md-preview article-body" id="mdPreview"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- 提交按钮 -->
        <div style="display:flex;gap:12px;align-items:center;">
          <button type="submit" class="btn btn-primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            保存文章
          </button>
          <a th:href="@{/admin/posts}" class="btn">取消</a>
        </div>

      </form>
    </div>
  </div>
</div>

<!-- Markdown 实时预览脚本 -->
<script th:src="@{/js/post-render.js}"></script>
<script>
  (function () {
    var editor = document.getElementById('mdContent');
    var preview = document.getElementById('mdPreview');

    function updatePreview() {
      var md = editor.value;
      preview.innerHTML = md ? renderMarkdown(md) : '<span style="color:var(--text-muted);">预览区域</span>';
    }

    // 初始渲染
    updatePreview();

    // 输入时实时更新（防抖 300ms）
    var timer;
    editor.addEventListener('input', function () {
      clearTimeout(timer);
      timer = setTimeout(updatePreview, 300);
    });
  })();
</script>
</body>
</html>
