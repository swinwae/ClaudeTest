spring:
  jpa:
    hibernate:
      # 开发环境自动创建/更新表结构，无需手动执行 schema.sql
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  thymeleaf:
    cache: false

logging:
  level:
    com.myblog: debug
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
