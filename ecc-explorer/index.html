<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECC 可视化学习器</title>
<style>
/* ─── CSS 变量 ─────────────────────────────────────────────────── */
:root {
  --bg:        #0d1117;
  --bg2:       #161b22;
  --bg3:       #21262d;
  --border:    #30363d;
  --text:      #c9d1d9;
  --text-dim:  #8b949e;
  --text-bright:#f0f6fc;
  --accent:    #58a6ff;
  --accent2:   #3fb950;
  --accent3:   #f78166;
  --accent4:   #d2a8ff;
  --accent5:   #ffa657;
  --accent6:   #79c0ff;
  --tag-bg:    #1f2d3d;
  --sidebar-w: 220px;
  --panel-w:   480px;
  --radius:    8px;
  --shadow:    0 8px 32px rgba(0,0,0,.4);
}
[data-theme="light"] {
  --bg:        #f6f8fa;
  --bg2:       #ffffff;
  --bg3:       #eaeef2;
  --border:    #d0d7de;
  --text:      #24292f;
  --text-dim:  #57606a;
  --text-bright:#1f2328;
  --tag-bg:    #ddf4ff;
  --shadow:    0 8px 32px rgba(0,0,0,.12);
}

/* ─── Reset ────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);line-height:1.6;height:100vh;
  display:flex;flex-direction:column;overflow:hidden}
a{color:var(--accent);text-decoration:none}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit}
code{font-family:'JetBrains Mono','Fira Code',monospace;font-size:.88em}

/* ─── 顶栏 ─────────────────────────────────────────────────────── */
.topbar{
  height:56px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:16px;
  flex-shrink:0;z-index:10;
}
.topbar-brand{font-size:1.1rem;font-weight:700;color:var(--text-bright);
  display:flex;align-items:center;gap:8px;white-space:nowrap}
.topbar-brand span{font-size:1.4rem}
.topbar-search{
  flex:1;max-width:480px;position:relative;
}
.topbar-search input{
  width:100%;padding:8px 12px 8px 36px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text);font-size:.9rem;
  transition:.2s;outline:none;
}
.topbar-search input:focus{border-color:var(--accent);background:var(--bg2)}
.topbar-search .search-icon{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  color:var(--text-dim);pointer-events:none;font-size:1rem;
}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn-theme{
  padding:6px 12px;border-radius:var(--radius);
  background:var(--bg3);border:1px solid var(--border);
  font-size:.82rem;transition:.15s;
}
.btn-theme:hover{background:var(--border)}
.stats-badge{
  font-size:.78rem;color:var(--text-dim);
  background:var(--bg3);padding:4px 10px;border-radius:20px;
  border:1px solid var(--border);
}

/* ─── 主布局 ────────────────────────────────────────────────────── */
.layout{display:flex;flex:1;overflow:hidden}

/* ─── 侧边栏 ────────────────────────────────────────────────────── */
.sidebar{
  width:var(--sidebar-w);background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;
}
.nav-section{padding:12px 0 4px}
.nav-section-label{
  font-size:.72rem;font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;color:var(--text-dim);
  padding:0 16px 4px;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 16px;cursor:pointer;
  border-radius:0;transition:.15s;
  font-size:.9rem;position:relative;
}
.nav-item:hover{background:var(--bg3)}
.nav-item.active{
  background:var(--tag-bg);color:var(--accent);font-weight:500;
}
.nav-item.active::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;background:var(--accent);border-radius:0 2px 2px 0;
}
.nav-icon{font-size:1.1rem;flex-shrink:0}
.nav-count{
  margin-left:auto;font-size:.75rem;
  background:var(--bg3);color:var(--text-dim);
  padding:1px 7px;border-radius:10px;
  border:1px solid var(--border);
}

/* ─── 内容区 ────────────────────────────────────────────────────── */
.main{flex:1;overflow:hidden;display:flex;position:relative}
.content-area{
  flex:1;overflow-y:auto;padding:24px;
  transition:margin-right .3s;
}
.content-area.panel-open{margin-right:var(--panel-w)}

/* ─── 页头 ─────────────────────────────────────────────────────── */
.page-header{margin-bottom:24px}
.page-title{font-size:1.5rem;font-weight:700;color:var(--text-bright);
  display:flex;align-items:center;gap:10px;margin-bottom:4px}
.page-desc{color:var(--text-dim);font-size:.9rem}

/* ─── 筛选栏 ────────────────────────────────────────────────────── */
.filter-bar{
  display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;
}
.filter-chip{
  padding:4px 12px;border-radius:16px;font-size:.8rem;cursor:pointer;
  border:1px solid var(--border);background:var(--bg3);
  transition:.15s;white-space:nowrap;
}
.filter-chip:hover{border-color:var(--accent);color:var(--accent)}
.filter-chip.active{
  background:var(--accent);border-color:var(--accent);
  color:#fff;font-weight:500;
}

/* ─── 卡片网格 ──────────────────────────────────────────────────── */
.card-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:16px;
}
.card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;cursor:pointer;
  transition:.2s;position:relative;overflow:hidden;
}
.card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.card.selected{border-color:var(--accent);background:var(--tag-bg)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.card-icon{font-size:1.4rem;flex-shrink:0}
.card-badges{display:flex;flex-wrap:wrap;gap:4px;justify-content:flex-end}
.badge{
  font-size:.7rem;padding:2px 7px;border-radius:10px;font-weight:500;
  white-space:nowrap;
}
.badge-model{background:#1a2a3a;color:var(--accent6)}
.badge-lang{background:#1a2a1a;color:var(--accent2)}
.badge-cat{background:#2a1a2a;color:var(--accent4)}
.badge-profile{background:#2a2a1a;color:var(--accent5)}
.badge-always{background:#2a1a1a;color:var(--accent3)}
.card-title{font-size:.95rem;font-weight:600;color:var(--text-bright);margin-bottom:4px}
.card-zh{font-size:.82rem;color:var(--text-dim);margin-bottom:8px}
.card-desc{font-size:.82rem;color:var(--text-dim);line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
.tag{
  font-size:.72rem;padding:2px 8px;border-radius:10px;
  background:var(--bg3);color:var(--text-dim);border:1px solid var(--border);
}

/* ─── 详情面板 ──────────────────────────────────────────────────── */
.detail-panel{
  position:absolute;right:0;top:0;bottom:0;
  width:var(--panel-w);background:var(--bg2);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  transform:translateX(100%);transition:.3s;
  z-index:5;
}
.detail-panel.open{transform:translateX(0)}
.panel-header{
  padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.panel-close{
  margin-left:auto;width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;
  border-radius:6px;background:var(--bg3);font-size:1rem;
  transition:.15s;flex-shrink:0;
}
.panel-close:hover{background:var(--border)}
.panel-title{font-size:1.05rem;font-weight:700;color:var(--text-bright)}
.panel-subtitle{font-size:.8rem;color:var(--text-dim)}
.panel-body{flex:1;overflow-y:auto;padding:20px}
.panel-section{margin-bottom:20px}
.panel-section-title{
  font-size:.75rem;font-weight:600;letter-spacing:.06em;
  text-transform:uppercase;color:var(--text-dim);
  margin-bottom:8px;
}
.panel-zh-desc{
  font-size:.9rem;color:var(--text-bright);line-height:1.6;
  background:var(--bg3);padding:12px;border-radius:var(--radius);
  border-left:3px solid var(--accent);
}
.panel-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.panel-info-item{
  background:var(--bg3);padding:8px 12px;border-radius:var(--radius);
}
.panel-info-label{font-size:.72rem;color:var(--text-dim);margin-bottom:2px}
.panel-info-value{font-size:.85rem;color:var(--text-bright);font-weight:500}
.panel-tip{
  background:#1a2a1a;border:1px solid #2a4a2a;
  padding:10px 14px;border-radius:var(--radius);
  font-size:.85rem;color:var(--accent2);
  display:flex;gap:8px;
}
.panel-usage{
  background:var(--bg);padding:10px 14px;border-radius:var(--radius);
  font-size:.85rem;font-family:monospace;color:var(--accent4);
  border:1px solid var(--border);position:relative;
}
.copy-btn{
  position:absolute;right:8px;top:8px;
  font-size:.72rem;padding:2px 8px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:4px;transition:.15s;
}
.copy-btn:hover{border-color:var(--accent)}
.panel-md{font-size:.85rem;line-height:1.7;color:var(--text)}
.panel-md h1,.panel-md h2,.panel-md h3{
  color:var(--text-bright);margin:16px 0 8px;font-size:1rem;
}
.panel-md h2{font-size:.95rem}
.panel-md h3{font-size:.88rem;color:var(--text-dim)}
.panel-md p{margin-bottom:8px}
.panel-md ul,.panel-md ol{padding-left:18px;margin-bottom:8px}
.panel-md li{margin-bottom:4px}
.panel-md code{
  background:var(--bg3);padding:1px 5px;border-radius:4px;
  color:var(--accent4);font-size:.82em;
}
.panel-md pre{
  background:var(--bg);padding:12px;border-radius:var(--radius);
  border:1px solid var(--border);overflow-x:auto;margin-bottom:10px;
}
.panel-md pre code{background:none;padding:0;color:var(--text)}
.panel-md table{width:100%;border-collapse:collapse;font-size:.82rem;margin-bottom:10px}
.panel-md th{background:var(--bg3);padding:6px 8px;text-align:left;
  border:1px solid var(--border);color:var(--text-bright)}
.panel-md td{padding:5px 8px;border:1px solid var(--border)}
.panel-md blockquote{
  border-left:3px solid var(--border);padding-left:12px;
  color:var(--text-dim);margin-bottom:8px;
}
.panel-md strong{color:var(--text-bright)}
.panel-md hr{border:none;border-top:1px solid var(--border);margin:12px 0}

/* ─── 总览 Dashboard ────────────────────────────────────────────── */
.overview-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:16px;margin-bottom:28px;
}
.stat-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px 16px;
  cursor:pointer;transition:.2s;text-align:center;
}
.stat-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.stat-number{font-size:2.2rem;font-weight:700;line-height:1}
.stat-label{font-size:.8rem;color:var(--text-dim);margin-top:4px}
.stat-sublabel{font-size:.72rem;color:var(--text-dim);margin-top:2px}
.intro-section{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px 24px;margin-bottom:24px;
}
.intro-section h3{color:var(--text-bright);margin-bottom:12px;font-size:1rem}
.learning-path{display:flex;flex-direction:column;gap:10px}
.path-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:10px 14px;background:var(--bg3);border-radius:var(--radius);
  cursor:pointer;transition:.15s;border:1px solid transparent;
}
.path-item:hover{border-color:var(--accent)}
.path-num{
  font-size:.8rem;font-weight:700;
  background:var(--accent);color:#fff;
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;
}
.path-text{font-size:.88rem}
.path-text strong{color:var(--text-bright)}
.path-text p{color:var(--text-dim);font-size:.8rem;margin-top:2px}

/* ─── Hook 时序图 ───────────────────────────────────────────────── */
.hook-timeline{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;margin-bottom:20px;
}
.hook-timeline h3{color:var(--text-bright);margin-bottom:16px;font-size:.95rem}
.timeline{display:flex;flex-direction:column;gap:0}
.timeline-group{margin-bottom:16px}
.timeline-group-label{
  font-size:.72rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  color:var(--text-dim);margin-bottom:8px;padding-left:12px;
}
.timeline-items{display:flex;flex-wrap:wrap;gap:6px;padding-left:12px}
.timeline-item{
  padding:5px 12px;border-radius:16px;font-size:.78rem;cursor:pointer;
  border:1px solid var(--border);background:var(--bg3);transition:.15s;
  display:flex;align-items:center;gap:6px;
}
.timeline-item:hover{border-color:var(--accent);color:var(--accent)}
.timeline-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ─── 搜索结果 ──────────────────────────────────────────────────── */
.search-results-info{
  color:var(--text-dim);font-size:.85rem;margin-bottom:16px;
}
.no-results{
  text-align:center;padding:60px 20px;color:var(--text-dim);
}
.no-results-icon{font-size:3rem;margin-bottom:12px}

/* ─── 滚动条 ────────────────────────────────────────────────────── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-dim)}

/* ─── 动画 ──────────────────────────────────────────────────────── */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card{animation:fadeIn .2s ease both}

/* ─── 响应式 ─────────────────────────────────────────────────────── */
@media(max-width:768px){
  .sidebar{display:none}
  .content-area.panel-open{margin-right:0}
  .detail-panel{width:100%}
}
</style>
</head>
<body>

<!-- 顶栏 -->
<header class="topbar">
  <div class="topbar-brand">
    <span>⚡</span> ECC 学习器
  </div>
  <div class="topbar-search">
    <span class="search-icon">🔍</span>
    <input type="text" id="globalSearch" placeholder="搜索 agents、commands、skills..." autocomplete="off">
  </div>
  <div class="topbar-right">
    <span class="stats-badge" id="versionBadge">v-.-.-</span>
    <button class="btn-theme" id="themeToggle">🌙 深色</button>
  </div>
</header>

<!-- 主布局 -->
<div class="layout">

  <!-- 侧边栏 -->
  <nav class="sidebar" id="sidebar">
    <div class="nav-section">
      <div class="nav-section-label">导航</div>
      <div class="nav-item active" data-page="overview" onclick="navigate('overview')">
        <span class="nav-icon">📊</span> 总览
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">组件</div>
      <div class="nav-item" data-page="agents" onclick="navigate('agents')">
        <span class="nav-icon">🤖</span> Agents
        <span class="nav-count" id="cnt-agents">0</span>
      </div>
      <div class="nav-item" data-page="commands" onclick="navigate('commands')">
        <span class="nav-icon">⚡</span> Commands
        <span class="nav-count" id="cnt-commands">0</span>
      </div>
      <div class="nav-item" data-page="skills" onclick="navigate('skills')">
        <span class="nav-icon">🎯</span> Skills
        <span class="nav-count" id="cnt-skills">0</span>
      </div>
      <div class="nav-item" data-page="hooks" onclick="navigate('hooks')">
        <span class="nav-icon">🪝</span> Hooks
        <span class="nav-count" id="cnt-hooks">0</span>
      </div>
      <div class="nav-item" data-page="rules" onclick="navigate('rules')">
        <span class="nav-icon">📋</span> Rules
        <span class="nav-count" id="cnt-rules">0</span>
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">工具</div>
      <div class="nav-item" data-page="search" onclick="navigate('search')">
        <span class="nav-icon">🔍</span> 全局搜索
      </div>
    </div>
  </nav>

  <!-- 内容区 -->
  <main class="main">
    <div class="content-area" id="contentArea">
      <!-- 内容由 JS 动态渲染 -->
    </div>

    <!-- 详情面板 -->
    <aside class="detail-panel" id="detailPanel">
      <div class="panel-header">
        <div>
          <div class="panel-title" id="panelTitle">-</div>
          <div class="panel-subtitle" id="panelSubtitle">-</div>
        </div>
        <button class="panel-close" onclick="closePanel()">✕</button>
      </div>
      <div class="panel-body" id="panelBody"></div>
    </aside>
  </main>
</div>

<script src="data.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════
   状态
═══════════════════════════════════════════════════════════ */
let currentPage = 'overview';
let currentFilter = 'all';
let selectedId = null;
let searchQuery = '';

const D = window.ECC_DATA;

/* ═══════════════════════════════════════════════════════════
   主题切换
═══════════════════════════════════════════════════════════ */
let isDark = true;
document.getElementById('themeToggle').onclick = () => {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? '' : 'light');
  document.getElementById('themeToggle').textContent = isDark ? '🌙 深色' : '☀️ 浅色';
};

/* ═══════════════════════════════════════════════════════════
   初始化
═══════════════════════════════════════════════════════════ */
function init() {
  if (!D) {
    document.getElementById('contentArea').innerHTML = `
      <div style="text-align:center;padding:80px 20px;color:var(--text-dim)">
        <div style="font-size:3rem;margin-bottom:16px">⚠️</div>
        <h2 style="color:var(--text-bright);margin-bottom:8px">找不到数据文件</h2>
        <p>请先运行：<code>node generate.js</code></p>
      </div>`;
    return;
  }
  // 更新统计
  document.getElementById('versionBadge').textContent = `v${D.meta.version}`;
  document.getElementById('cnt-agents').textContent = D.agents.length;
  document.getElementById('cnt-commands').textContent = D.commands.length;
  document.getElementById('cnt-skills').textContent = D.skills.length;
  document.getElementById('cnt-hooks').textContent = D.hooks.length;
  document.getElementById('cnt-rules').textContent = D.rules.length;

  // 全局搜索
  document.getElementById('globalSearch').addEventListener('input', e => {
    searchQuery = e.target.value.trim();
    if (searchQuery) {
      navigate('search');
    } else if (currentPage === 'search') {
      navigate('overview');
    } else {
      renderPage(currentPage);
    }
  });

  navigate('overview');
}

/* ═══════════════════════════════════════════════════════════
   导航
═══════════════════════════════════════════════════════════ */
function navigate(page) {
  currentPage = page;
  currentFilter = 'all';
  selectedId = null;
  closePanel();
  // 更新侧边栏
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  renderPage(page);
}

function renderPage(page) {
  const area = document.getElementById('contentArea');
  switch (page) {
    case 'overview':  area.innerHTML = renderOverview(); break;
    case 'agents':    area.innerHTML = renderAgents(); break;
    case 'commands':  area.innerHTML = renderCommands(); break;
    case 'skills':    area.innerHTML = renderSkills(); break;
    case 'hooks':     area.innerHTML = renderHooks(); break;
    case 'rules':     area.innerHTML = renderRules(); break;
    case 'search':    area.innerHTML = renderSearch(); break;
  }
}

/* ═══════════════════════════════════════════════════════════
   Markdown 渲染
═══════════════════════════════════════════════════════════ */
function renderMd(md) {
  if (!md) return '';
  let html = escapeHtml(md);
  // 代码块
  html = html.replace(/```[\w]*\n([\s\S]*?)```/g, (_, code) =>
    `<pre><code>${code}</code></pre>`);
  // 内联代码
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // 标题
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // 粗体 / 斜体
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  // 表格
  html = html.replace(/((?:\|[^\n]+\|\n)+)/g, block => {
    const rows = block.trim().split('\n');
    let table = '<table>';
    rows.forEach((row, i) => {
      if (/^\|[-| ]+\|$/.test(row)) return;
      const cells = row.split('|').filter((_, j, a) => j > 0 && j < a.length - 1);
      const tag = i === 0 ? 'th' : 'td';
      table += '<tr>' + cells.map(c => `<${tag}>${c.trim()}</${tag}>`).join('') + '</tr>';
    });
    return table + '</table>';
  });
  // HR
  html = html.replace(/^---$/gm, '<hr>');
  // 无序列表
  html = html.replace(/((?:^- .+\n?)+)/gm, block => {
    const items = block.trim().split('\n').map(l => `<li>${l.slice(2)}</li>`).join('');
    return `<ul>${items}</ul>`;
  });
  // 有序列表
  html = html.replace(/((?:^\d+\. .+\n?)+)/gm, block => {
    const items = block.trim().split('\n').map(l => `<li>${l.replace(/^\d+\. /, '')}</li>`).join('');
    return `<ol>${items}</ol>`;
  });
  // blockquote
  html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  // 段落
  html = html.split('\n\n').map(p => {
    p = p.trim();
    if (!p || /^<(h[123]|ul|ol|pre|table|hr|blockquote)/.test(p)) return p;
    return `<p>${p.replace(/\n/g, ' ')}</p>`;
  }).join('');
  return html;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

  document.getElementById('panelTitle').textContent = zh.name || id;
  document.getElementById('panelSubtitle').textContent = `${zh.lang || '通用'} · ${r.id}`;
  document.getElementById('panelBody').innerHTML = `
    <div class="panel-section">
      <div class="panel-section-title">规则说明</div>
      <div class="panel-zh-desc">${zh.desc || r.description}</div>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">规则信息</div>
      <div class="panel-info-grid">
        <div class="panel-info-item">
          <div class="panel-info-label">适用语言</div>
          <div class="panel-info-value">${zh.lang || '通用'}</div>
        </div>
        <div class="panel-info-item">
          <div class="panel-info-label">Always Apply</div>
          <div class="panel-info-value">${r.alwaysApply ? '✅ 是' : '❌ 否'}</div>
        </div>
      </div>
    </div>
    ${zh.key ? `
    <div class="panel-section">
      <div class="panel-section-title">核心要点</div>
      <div class="panel-tip">🔑 ${zh.key}</div>
    </div>` : ''}
    <div class="panel-section">
      <div class="panel-section-title">完整规则内容</div>
      <div class="panel-md">${renderMd(r.content)}</div>
    </div>`;
  openPanel();
}

/* ═══════════════════════════════════════════════════════════
   全局搜索页
═══════════════════════════════════════════════════════════ */
function renderSearch() {
  if (!searchQuery) {
    return `<div class="no-results"><div class="no-results-icon">🔍</div>
      <p>在顶部搜索框输入关键词</p></div>`;
  }
  const q = searchQuery.toLowerCase();
  const results = [];

  D.agents.forEach(a => {
    const zh = a.zh || {};
    if (a.id.includes(q) || a.name.toLowerCase().includes(q)
      || (zh.name||'').includes(q) || (zh.desc||'').includes(q)
      || (zh.tags||[]).some(t => t.includes(q))) {
      results.push({ type: 'agent', icon: '🤖', label: 'Agent',
        title: zh.name || a.name, sub: a.name, desc: zh.desc || a.description,
        action: `openAgent('${a.id}')` });
    }
  });
  D.commands.forEach(c => {
    const zh = c.zh || {};
    if (c.id.includes(q) || (zh.name||'').includes(q) || (zh.desc||'').includes(q)) {
      results.push({ type: 'command', icon: '⚡', label: 'Command',
        title: zh.name || c.id, sub: '/' + c.id, desc: zh.desc || c.description,
        action: `openCommand('${c.id}')` });
    }
  });
  D.skills.forEach(s => {
    if (s.id.includes(q) || (s.zh||'').includes(q) || s.category.includes(q)
      || (s.description||'').toLowerCase().includes(q)) {
      results.push({ type: 'skill', icon: '🎯', label: 'Skill',
        title: s.zh || s.id, sub: s.id, desc: s.description,
        action: `openSkill('${s.id}')` });
    }
  });
  D.hooks.forEach(h => {
    const zh = h.zh || {};
    if (h.id.includes(q) || (zh.name||'').includes(q) || (zh.desc||'').includes(q)) {
      results.push({ type: 'hook', icon: '🪝', label: 'Hook',
        title: zh.name || h.id, sub: h.file, desc: zh.desc,
        action: `openHook('${h.id}')` });
    }
  });
  D.rules.forEach(r => {
    const zh = r.zh || {};
    if (r.id.includes(q) || (zh.name||'').includes(q) || (zh.desc||'').includes(q)
      || (zh.lang||'').includes(q)) {
      results.push({ type: 'rule', icon: '📋', label: 'Rule',
        title: zh.name || r.id, sub: r.id, desc: zh.desc,
        action: `openRule('${r.id}')` });
    }
  });

  if (!results.length) {
    return `<div class="page-header">
        <div class="page-title">🔍 搜索：「${escapeHtml(searchQuery)}」</div></div>
      <div class="no-results"><div class="no-results-icon">😕</div>没有找到相关内容</div>`;
  }

  const cards = results.map(r => `
    <div class="card" onclick="${r.action}">
      <div class="card-top">
        <span class="card-icon">${r.icon}</span>
        <span class="badge badge-cat">${r.label}</span>
      </div>
      <div class="card-title">${r.title}</div>
      <div class="card-zh" style="font-family:monospace;font-size:.75rem">${r.sub}</div>
      <div class="card-desc">${r.desc || ''}</div>
    </div>`).join('');

  return `
    <div class="page-header">
      <div class="page-title">🔍 搜索：「${escapeHtml(searchQuery)}」</div>
      <div class="page-desc">找到 ${results.length} 个结果</div>
    </div>
    <div class="card-grid">${cards}</div>`;
}

/* ═══════════════════════════════════════════════════════════
   面板控制
═══════════════════════════════════════════════════════════ */
function openPanel() {
  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('contentArea').classList.add('panel-open');
}
function closePanel() {
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('contentArea').classList.remove('panel-open');
  selectedId = null;
}

/* ═══════════════════════════════════════════════════════════
   工具函数
═══════════════════════════════════════════════════════════ */
function copyText(text) {
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = '已复制！';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

// ESC 关闭面板
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePanel();
});

/* ═══════════════════════════════════════════════════════════
   启动
═══════════════════════════════════════════════════════════ */
init();
</script>
