<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code 学习站</title>
<style>
/* ─── CSS 变量 ─────────────────────────────────────────────────────────── */
:root {
  --bg:         #0d1117;
  --bg2:        #161b22;
  --bg3:        #21262d;
  --border:     #30363d;
  --text:       #c9d1d9;
  --text-dim:   #8b949e;
  --text-bright:#f0f6fc;
  --accent:     #58a6ff;
  --accent2:    #3fb950;
  --accent3:    #f78166;
  --accent4:    #d2a8ff;
  --accent5:    #ffa657;
  --tag-bg:     #1f2d3d;
  --sidebar-w:  230px;
  --radius:     8px;
  --shadow:     0 4px 16px rgba(0,0,0,.4);
  --read-max:   740px;
}
[data-theme="light"] {
  --bg:         #f6f8fa;
  --bg2:        #ffffff;
  --bg3:        #eaeef2;
  --border:     #d0d7de;
  --text:       #24292f;
  --text-dim:   #57606a;
  --text-bright:#1f2328;
  --tag-bg:     #ddf4ff;
  --shadow:     0 4px 16px rgba(0,0,0,.1);
}

/* ─── Reset ─────────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);line-height:1.6;
  height:100vh;display:flex;flex-direction:column;overflow:hidden;
}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit}
code,pre{font-family:'JetBrains Mono','Fira Code','Cascadia Code',monospace}
code{font-size:.88em;background:var(--bg3);padding:.15em .4em;border-radius:4px}
pre{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);
    padding:16px;overflow-x:auto;line-height:1.5}
pre code{background:none;padding:0;font-size:.85em}
table{width:100%;border-collapse:collapse;margin:12px 0}
th,td{padding:8px 12px;border:1px solid var(--border);text-align:left}
th{background:var(--bg3);font-weight:600}
h1,h2,h3,h4{color:var(--text-bright);font-weight:600}
p{margin:10px 0}
ul,ol{padding-left:1.5em;margin:8px 0}
li{margin:4px 0}
hr{border:none;border-top:1px solid var(--border);margin:20px 0}
blockquote{
  border-left:3px solid var(--accent);padding:8px 16px;
  background:var(--bg3);border-radius:0 var(--radius) var(--radius) 0;
  margin:12px 0;
}
blockquote p{margin:4px 0}

/* ─── 顶栏 ──────────────────────────────────────────────────────────────── */
.topbar{
  height:52px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0;z-index:10;
}
.topbar-brand{
  font-size:1.05rem;font-weight:700;color:var(--text-bright);
  display:flex;align-items:center;gap:8px;white-space:nowrap;cursor:pointer;
}
.topbar-brand:hover{color:var(--accent)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn-icon{
  padding:6px 12px;border-radius:var(--radius);background:var(--bg3);
  border:1px solid var(--border);font-size:.82rem;transition:.15s;
}
.btn-icon:hover{background:var(--border)}

/* ─── 主布局 ─────────────────────────────────────────────────────────────── */
.layout{display:flex;flex:1;overflow:hidden}

/* ─── 侧边栏 ─────────────────────────────────────────────────────────────── */
.sidebar{
  width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;padding:8px 0 20px;
}
.nav-group{padding:8px 0 4px}
.nav-group-label{
  font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text-dim);padding:6px 16px 4px;
}
.nav-item{
  display:flex;align-items:center;gap:8px;padding:7px 16px;
  font-size:.88rem;cursor:pointer;transition:.12s;border-radius:6px;margin:1px 6px;
}
.nav-item:hover{background:var(--bg3);color:var(--text-bright)}
.nav-item.active{background:var(--accent);color:#fff;font-weight:600}
.nav-item.active:hover{background:var(--accent)}
.nav-item .icon{font-size:1rem;width:18px;text-align:center;flex-shrink:0}
.nav-item .badge{
  margin-left:auto;font-size:.7rem;background:var(--bg3);
  color:var(--text-dim);padding:1px 7px;border-radius:20px;border:1px solid var(--border);
}
.nav-item.active .badge{background:rgba(255,255,255,.2);color:#fff;border-color:transparent}

/* 进度条 */
.stage-progress{
  margin:2px 16px 4px;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;
}
.stage-progress-fill{height:100%;background:var(--accent2);border-radius:2px;transition:.3s}

/* ─── 内容区 ─────────────────────────────────────────────────────────────── */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}

/* ─── 首页 ──────────────────────────────────────────────────────────────── */
.home{max-width:900px;margin:0 auto;padding:48px 32px}
.home-hero{text-align:center;margin-bottom:48px}
.home-hero h1{font-size:2.2rem;margin-bottom:12px;
  background:linear-gradient(135deg,#58a6ff,#d2a8ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.home-hero p{font-size:1.05rem;color:var(--text-dim);max-width:520px;margin:0 auto}

.home-stats{display:flex;gap:16px;justify-content:center;margin:32px 0}
.stat-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px 28px;text-align:center;flex:1;max-width:160px;
}
.stat-card .num{font-size:2rem;font-weight:700;color:var(--accent)}
.stat-card .label{font-size:.82rem;color:var(--text-dim);margin-top:4px}

.home-sections{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-top:32px}
.home-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;cursor:pointer;transition:.2s;
}
.home-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.home-card-icon{font-size:2rem;margin-bottom:10px}
.home-card-title{font-size:1rem;font-weight:600;color:var(--text-bright);margin-bottom:6px}
.home-card-desc{font-size:.83rem;color:var(--text-dim);line-height:1.5}
.home-start{margin-top:40px;text-align:center}
.btn-primary{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--accent);color:#fff;padding:10px 24px;
  border-radius:var(--radius);font-size:.95rem;font-weight:600;
  transition:.15s;
}
.btn-primary:hover{background:#79c0ff;text-decoration:none}
.home-progress{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;margin-top:24px;
}
.home-progress h3{font-size:.95rem;margin-bottom:12px;color:var(--text-bright)}
.path-progress-row{display:flex;align-items:center;gap:10px;margin:8px 0;font-size:.85rem}
.path-progress-row .stage-name{width:70px;color:var(--text-dim);flex-shrink:0}
.path-progress-bar{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.path-progress-bar-fill{height:100%;background:var(--accent2);border-radius:3px;transition:.3s}
.path-progress-row .pct{width:36px;text-align:right;color:var(--text-dim)}

/* ─── 学习路径总览 ──────────────────────────────────────────────────────── */
.path-overview{max-width:860px;margin:0 auto;padding:32px}
.page-title{font-size:1.5rem;margin-bottom:6px;color:var(--text-bright)}
.page-subtitle{font-size:.9rem;color:var(--text-dim);margin-bottom:28px}
.stage-list{display:flex;flex-direction:column;gap:16px}
.stage-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;cursor:pointer;transition:.2s;
}
.stage-card:hover{border-color:var(--accent);box-shadow:var(--shadow)}
.stage-card-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.stage-icon{font-size:1.6rem}
.stage-meta{flex:1}
.stage-title{font-size:1.05rem;font-weight:600;color:var(--text-bright)}
.stage-desc{font-size:.83rem;color:var(--text-dim);margin-top:2px}
.stage-badge{font-size:.8rem;color:var(--text-dim);flex-shrink:0}
.lesson-list{display:flex;flex-wrap:wrap;gap:8px}
.lesson-chip{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:20px;padding:4px 12px;font-size:.8rem;cursor:pointer;transition:.15s;
}
.lesson-chip:hover{border-color:var(--accent);background:var(--tag-bg)}
.lesson-chip.done{border-color:var(--accent2);color:var(--accent2)}
.lesson-chip .check{font-size:.75rem}

/* ─── 课程详情 ──────────────────────────────────────────────────────────── */
.lesson-view{
  display:flex;flex:1;overflow:hidden;
}
.lesson-content-wrap{
  flex:1;overflow-y:auto;padding:0 32px 60px;
}
.lesson-header{
  padding:28px 0 20px;border-bottom:1px solid var(--border);margin-bottom:28px;
}
.lesson-breadcrumb{font-size:.82rem;color:var(--text-dim);margin-bottom:8px}
.lesson-breadcrumb a{color:var(--text-dim)}
.lesson-breadcrumb a:hover{color:var(--accent)}
.lesson-title{font-size:1.6rem;color:var(--text-bright);margin-bottom:10px}
.lesson-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.tag{background:var(--tag-bg);color:var(--accent);font-size:.75rem;padding:3px 8px;border-radius:12px}
.difficulty-tag{font-size:.75rem;padding:3px 8px;border-radius:12px}
.difficulty-tag.入门{background:#1f3d2f;color:var(--accent2)}
.difficulty-tag.中级{background:#3d2f1f;color:var(--accent5)}
.difficulty-tag.高级{background:#3d1f1f;color:var(--accent3)}
.read-time{font-size:.8rem;color:var(--text-dim)}

.lesson-body{
  max-width:var(--read-max);line-height:1.8;font-size:.95rem;
}
.lesson-body h2{font-size:1.2rem;margin:28px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.lesson-body h3{font-size:1rem;margin:20px 0 8px;color:var(--accent4)}
.lesson-body h4{font-size:.95rem;margin:16px 0 6px}

/* 练习区 */
.exercises{margin-top:40px;max-width:var(--read-max)}
.exercises-title{font-size:1rem;font-weight:700;color:var(--text-bright);
  margin-bottom:16px;display:flex;align-items:center;gap:8px}
.exercise-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  margin-bottom:12px;overflow:hidden;
}
.exercise-header{
  display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;
  transition:.15s;user-select:none;
}
.exercise-header:hover{background:var(--bg3)}
.exercise-header .ex-icon{font-size:1.1rem}
.exercise-header .ex-title{flex:1;font-size:.92rem;font-weight:500;color:var(--text-bright)}
.exercise-header .ex-diff{font-size:.75rem;padding:2px 8px;border-radius:10px}
.exercise-header .ex-arrow{color:var(--text-dim);transition:.2s;font-size:.8rem}
.exercise-card.open .ex-arrow{transform:rotate(90deg)}
.exercise-body{
  display:none;padding:0 16px 16px;border-top:1px solid var(--border);
}
.exercise-card.open .exercise-body{display:block}
.exercise-desc{font-size:.88rem;line-height:1.7;margin:12px 0}
.collapse-block{margin-top:10px}
.collapse-trigger{
  display:inline-flex;align-items:center;gap:6px;font-size:.82rem;
  color:var(--accent);cursor:pointer;padding:4px 0;
}
.collapse-trigger:hover{color:var(--text-bright)}
.collapse-content{
  display:none;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius);padding:12px;margin-top:8px;font-size:.85rem;
}
.collapse-block.open .collapse-content{display:block}
.collapse-block.open .collapse-arrow{transform:rotate(90deg)}
.collapse-arrow{display:inline-block;transition:.2s;font-size:.7rem}

/* 完成按钮 */
.lesson-actions{
  max-width:var(--read-max);margin-top:32px;padding-top:20px;
  border-top:1px solid var(--border);display:flex;align-items:center;gap:16px;
}
.btn-complete{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--bg3);border:1px solid var(--border);
  padding:8px 18px;border-radius:var(--radius);font-size:.88rem;transition:.15s;
}
.btn-complete:hover{border-color:var(--accent2);color:var(--accent2)}
.btn-complete.done{background:#1a3a26;border-color:var(--accent2);color:var(--accent2)}
.btn-nav{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--bg3);border:1px solid var(--border);
  padding:8px 16px;border-radius:var(--radius);font-size:.85rem;transition:.15s;
}
.btn-nav:hover{border-color:var(--accent);color:var(--accent)}

/* 课程目录（右侧） */
.lesson-toc{
  width:200px;flex-shrink:0;padding:28px 16px;overflow-y:auto;
  border-left:1px solid var(--border);display:none;
}
@media(min-width:1100px){.lesson-toc{display:block}}
.toc-title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  color:var(--text-dim);margin-bottom:10px}
.toc-item{
  font-size:.8rem;color:var(--text-dim);cursor:pointer;padding:3px 0 3px 10px;
  border-left:2px solid transparent;transition:.15s;display:block;line-height:1.4;margin:2px 0;
}
.toc-item:hover{color:var(--accent);border-left-color:var(--accent)}
.toc-item.h3{padding-left:20px;font-size:.76rem}

/* ─── 最佳实践 ──────────────────────────────────────────────────────────── */
.practices-list{max-width:860px;margin:0 auto;padding:32px}
.practices-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-top:20px}
.practice-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px;cursor:pointer;transition:.2s;
}
.practice-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.practice-card h3{font-size:.95rem;color:var(--text-bright);margin-bottom:8px}
.practice-card .desc{font-size:.82rem;color:var(--text-dim);line-height:1.5;margin-bottom:10px}
.practice-card .tags{display:flex;flex-wrap:wrap;gap:4px}

/* 最佳实践详情（复用 lesson-body 样式） */
.practice-view{max-width:var(--read-max);margin:0 auto;padding:32px}
.practice-view .lesson-breadcrumb{margin-bottom:12px}
.practice-view .lesson-title{margin-bottom:16px}

/* ─── 速查卡片 ──────────────────────────────────────────────────────────── */
.cheatsheet{max-width:900px;margin:0 auto;padding:32px}
.cheatsheet-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:20px;margin-top:20px}
.cheatsheet-section{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;
}
.cheatsheet-section h2{font-size:1rem;margin-bottom:14px;color:var(--text-bright)}

/* ─── 通用工具 ──────────────────────────────────────────────────────────── */
.empty{text-align:center;padding:60px;color:var(--text-dim)}
.empty .icon{font-size:3rem;margin-bottom:12px}
.tags-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.filter-tag{
  background:var(--bg3);border:1px solid var(--border);
  padding:4px 12px;border-radius:20px;font-size:.8rem;cursor:pointer;transition:.15s;
}
.filter-tag:hover,.filter-tag.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ─── 响应式 ─────────────────────────────────────────────────────────────── */
@media(max-width:768px){
  .sidebar{display:none}
  .home{padding:24px 16px}
  .home-stats{flex-wrap:wrap}
  .home-hero h1{font-size:1.6rem}
  .lesson-content-wrap{padding:0 16px 40px}
  .practices-list,.path-overview,.cheatsheet{padding:20px 16px}
  .cheatsheet-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<!-- 顶栏 -->
<header class="topbar">
  <div class="topbar-brand" onclick="navigate('home')">
    <span>🤖</span> Claude Code 学习站
  </div>
  <div class="topbar-right">
    <button class="btn-icon" onclick="toggleTheme()" id="themeBtn">🌙 深色</button>
  </div>
</header>

<!-- 主布局 -->
<div class="layout">
  <!-- 侧边栏 -->
  <nav class="sidebar" id="sidebar"></nav>

  <!-- 内容区 -->
  <main class="main" id="main"></main>
</div>

<script src="data.js"></script>
<script>
// ─── 进度管理 ─────────────────────────────────────────────────────────────────

const PROGRESS_KEY = 'claude-learn-progress';

function getProgress() {
  try { return JSON.parse(localStorage.getItem(PROGRESS_KEY) || '{}'); }
  catch { return {}; }
}

function setLessonDone(lessonId, done) {
  const p = getProgress();
  if (done) p[lessonId] = true;
  else delete p[lessonId];
  localStorage.setItem(PROGRESS_KEY, JSON.stringify(p));
}

function isLessonDone(lessonId) {
  return !!getProgress()[lessonId];
}

function getStageProgress(stage) {
  if (!stage.lessons.length) return 0;
  const done = stage.lessons.filter(l => isLessonDone(l.id)).length;
  return Math.round((done / stage.lessons.length) * 100);
}

function getTotalProgress() {
  if (!window.LEARN_DATA) return { done: 0, total: 0 };
  let total = 0, done = 0;
  LEARN_DATA.path.forEach(s => {
    s.lessons.forEach(l => { total++; if (isLessonDone(l.id)) done++; });
  });
  return { done, total };
}

// ─── 主题 ────────────────────────────────────────────────────────────────────

function initTheme() {
  const saved = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved === 'light' ? 'light' : '');
  document.getElementById('themeBtn').textContent = saved === 'light' ? '☀️ 浅色' : '🌙 深色';
}

function toggleTheme() {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  const next = isLight ? 'dark' : 'light';
  localStorage.setItem('theme', next);
  document.documentElement.setAttribute('data-theme', next === 'light' ? 'light' : '');
  document.getElementById('themeBtn').textContent = next === 'light' ? '☀️ 浅色' : '🌙 深色';
}

// ─── Markdown 渲染 ────────────────────────────────────────────────────────────

function renderMd(md) {
  if (!md) return '';
  let html = md;

  // 代码块（多行）
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    const escaped = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `<pre><code class="language-${lang}">${escaped.trimEnd()}</code></pre>`;
  });

  // 行内代码
  html = html.replace(/`([^`\n]+)`/g, '<code>$1</code>');

  // 标题
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // 粗体 / 斜体
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // 表格
  html = html.replace(/((?:^\|.+\|\n)+)/gm, (block) => {
    const rows = block.trim().split('\n');
    if (rows.length < 2) return block;
    const isHeaderSep = rows[1] && rows[1].replace(/[\|\-\:\s]/g, '') === '';
    let out = '<table>';
    rows.forEach((row, i) => {
      if (i === 1 && isHeaderSep) return;
      const cells = row.split('|').slice(1, -1).map(c => c.trim());
      const tag = (i === 0 && isHeaderSep) ? 'th' : 'td';
      out += '<tr>' + cells.map(c => `<${tag}>${renderInline(c)}</${tag}>`).join('') + '</tr>';
    });
    out += '</table>';
    return out;
  });

  // blockquote（> 开头）
  html = html.replace(/^> (.+)$/gm, '<blockquote><p>$1</p></blockquote>');
  // 合并相邻 blockquote
  html = html.replace(/<\/blockquote>\n<blockquote>/g, '\n');

  // 有序列表
  html = html.replace(/((?:^\d+\. .+\n?)+)/gm, (block) => {
    const items = block.trim().split('\n').map(l => `<li>${renderInline(l.replace(/^\d+\. /,''))}</li>`).join('');
    return `<ol>${items}</ol>`;
  });

  // 无序列表（- 或 * 开头）
  html = html.replace(/((?:^[-*] .+\n?)+)/gm, (block) => {
    const items = block.trim().split('\n').map(l => `<li>${renderInline(l.replace(/^[-*] /,''))}</li>`).join('');
    return `<ul>${items}</ul>`;
  });

  // 分隔线
  html = html.replace(/^---+$/gm, '<hr>');

  // 段落（非 HTML 标签行）
  html = html.split('\n').map(line => {
    const trimmed = line.trim();
    if (!trimmed) return '';
    if (/^<[a-z]/.test(trimmed)) return line;
    return `<p>${renderInline(trimmed)}</p>`;
  }).join('\n');

  // 清理多余空行
  html = html.replace(/\n{3,}/g, '\n\n');

  return html;
}

function renderInline(text) {
  return text
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
}

// ─── 目录生成 ─────────────────────────────────────────────────────────────────

function buildToc(html) {
  const items = [];
  const re = /<(h[23])[^>]*>(.+?)<\/h[23]>/gi;
  let m;
  while ((m = re.exec(html)) !== null) {
    const level = m[1];
    const text = m[2].replace(/<[^>]+>/g, '');
    const id = 'h-' + text.replace(/[^\w\u4e00-\u9fa5]/g, '-').toLowerCase();
    items.push({ level, text, id });
  }
  return items;
}

function injectHeadingIds(html) {
  return html.replace(/<(h[23])>(.+?)<\/h[23]>/gi, (_, tag, content) => {
    const text = content.replace(/<[^>]+>/g, '');
    const id = 'h-' + text.replace(/[^\w\u4e00-\u9fa5]/g, '-').toLowerCase();
    return `<${tag} id="${id}">${content}</${tag}>`;
  });
}

// ─── 查找数据 ─────────────────────────────────────────────────────────────────

function findLesson(id) {
  for (const stage of LEARN_DATA.path) {
    for (const lesson of stage.lessons) {
      if (lesson.id === id) return { lesson, stage };
    }
  }
  return null;
}

function findLessonNeighbors(lessonId) {
  const allLessons = LEARN_DATA.path.flatMap(s => s.lessons);
  const idx = allLessons.findIndex(l => l.id === lessonId);
  return {
    prev: idx > 0 ? allLessons[idx - 1] : null,
    next: idx >= 0 && idx < allLessons.length - 1 ? allLessons[idx + 1] : null,
  };
}

function findPractice(id) {
  return LEARN_DATA.practices.find(p => p.id === id);
}

// ─── 学习路径总览 ─────────────────────────────────────────────────────────────

      <div class="page-subtitle">${stage.description} · ${stage.lessons.length} 课 · 完成 ${pct}%</div>

          return `

              <div class="stage-card-header">
                <div style="font-size:1.4rem">${done ? '✅' : '📖'}</div>

          `;

      <div style="margin-top:24px">
        ${LEARN_DATA.path.map(s => {
          const active = s.id === stageId;

        }).join('')}

}

// ─── 课程详情 ─────────────────────────────────────────────────────────────────

function renderLesson(lessonId) {
  const found = findLesson(lessonId);
  if (!found) { renderHome(); return; }

  const { lesson, stage } = found;
  const { prev, next } = findLessonNeighbors(lessonId);
  const done = isLessonDone(lessonId);

  let renderedHtml = renderMd(lesson.content);
  renderedHtml = injectHeadingIds(renderedHtml);
  const toc = buildToc(renderedHtml);

  const tocHtml = toc.length > 0 ? `
    <aside class="lesson-toc">
      <div class="toc-title">本课目录</div>
      ${toc.map(item => `
        <a class="toc-item ${item.level}" href="#${item.id}">${item.text}</a>
      `).join('')}
    </aside>
  ` : '';

  const exercisesHtml = lesson.exercises.length > 0 ? `
    <div class="exercises">
      <div class="exercises-title">💪 动手练习（${lesson.exercises.length} 个）</div>
      ${lesson.exercises.map((ex, i) => `
        <div class="exercise-card" id="ex-${i}">
          <div class="exercise-header" onclick="toggleExercise(${i})">
            <span class="ex-icon">🎯</span>
            <span class="ex-title">${ex.title}</span>
            <span class="ex-diff difficulty-tag ${ex.difficulty}">${ex.difficulty}</span>
            <span class="ex-arrow">▶</span>
          </div>
          <div class="exercise-body">
            <div class="exercise-desc">${renderMd(ex.description)}</div>
            ${ex.hints ? `
              <div class="collapse-block" id="hint-${i}">
                <div class="collapse-trigger" onclick="toggleCollapse('hint-${i}')">
                  <span class="collapse-arrow">▶</span> 查看提示
                </div>
                <div class="collapse-content">${renderMd(ex.hints)}</div>
              </div>
            ` : ''}
            ${ex.solution ? `
              <div class="collapse-block" id="sol-${i}">
                <div class="collapse-trigger" onclick="toggleCollapse('sol-${i}')">
                  <span class="collapse-arrow">▶</span> 查看参考答案
                </div>
                <div class="collapse-content">${renderMd(ex.solution)}</div>
              </div>
            ` : ''}
          </div>
        </div>
      `).join('')}
    </div>
  ` : '';

  document.getElementById('main').innerHTML = `
    <div class="lesson-view">
      <div class="lesson-content-wrap">
        <div class="lesson-header">
          <div class="lesson-breadcrumb">
            <a onclick="navigate('home')" style="cursor:pointer">首页</a> /
            <a onclick="navigate('path/${stage.id}')" style="cursor:pointer">${stage.title}</a> /
            ${lesson.title}
          </div>
          <h1 class="lesson-title">${lesson.title}</h1>
          <div class="lesson-meta">
            <span class="difficulty-tag ${lesson.difficulty}">${lesson.difficulty}</span>
            <span class="read-time">⏱ ${lesson.readTime} 分钟阅读</span>
            ${lesson.tags.map(t => `<span class="tag">${t}</span>`).join('')}
          </div>
        </div>

        <div class="lesson-body">${renderedHtml}</div>

        ${exercisesHtml}

        <div class="lesson-actions">
          <button class="btn-complete ${done?'done':''}" onclick="toggleComplete('${lessonId}')">
            ${done ? '✅ 已完成' : '○ 标记为完成'}
          </button>
          <div style="flex:1"></div>
          ${prev ? `<button class="btn-nav" onclick="navigate('lesson/${prev.id}')">← ${prev.title}</button>` : ''}
          ${next ? `<button class="btn-nav" onclick="navigate('lesson/${next.id}')">${next.title} →</button>` : ''}
        </div>
      </div>
      ${tocHtml}
    </div>
  `;
}

// ─── 最佳实践 ─────────────────────────────────────────────────────────────────

function renderPractices(tag) {
  let items = LEARN_DATA.practices;
  const allTags = [...new Set(items.flatMap(p => p.tags))];

  if (tag) items = items.filter(p => p.tags.includes(tag));

  document.getElementById('main').innerHTML = `
    <div class="practices-list">
      <div class="page-title">📋 最佳实践</div>
      <div class="page-subtitle">从实战中提炼的 Claude Code 使用技巧和规范</div>

      ${allTags.length ? `
        <div class="tags-row">
          <span class="filter-tag ${!tag?'active':''}" onclick="navigate('practices')">全部</span>
          ${allTags.map(t => `
            <span class="filter-tag ${tag===t?'active':''}" onclick="navigate('practices/tag:${t}')">${t}</span>
          `).join('')}
        </div>
      ` : ''}

      ${items.length === 0 ? `
        <div class="empty"><div class="icon">📭</div><div>暂无相关内容</div></div>
      ` : `
        <div class="practices-grid">
          ${items.map(p => `
            <div class="practice-card" onclick="navigate('practice/${p.id}')">
              <h3>${p.title}</h3>
              <div class="desc">${p.description || '点击查看详情'}</div>
              <div class="tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
            </div>
          `).join('')}
        </div>
      `}
    </div>
  `;
}

function renderPractice(id) {
  const p = findPractice(id);
  if (!p) { renderPractices(); return; }

  const html = injectHeadingIds(renderMd(p.content));

  document.getElementById('main').innerHTML = `
    <div class="practice-view">
      <div class="lesson-breadcrumb">
        <a onclick="navigate('practices')" style="cursor:pointer">最佳实践</a> / ${p.title}
      </div>
      <h1 class="lesson-title">${p.title}</h1>
      <div class="lesson-meta" style="margin-bottom:20px">
        ${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}
      </div>
      <div class="lesson-body">${html}</div>
    </div>
  `;
}

// ─── 速查卡片 ─────────────────────────────────────────────────────────────────

function renderCheatsheet() {
  const cs = LEARN_DATA.cheatsheet;
  const sections = Object.entries(cs).sort((a,b) => (a[1].order||99) - (b[1].order||99));

  document.getElementById('main').innerHTML = `
    <div class="cheatsheet">
      <div class="page-title">⚡ 速查卡片</div>
      <div class="page-subtitle">Claude Code 常用快捷键、命令和配置参考</div>

      <div class="cheatsheet-grid">
        ${sections.map(([key, sec]) => `
          <div class="cheatsheet-section">
            <h2>${sec.title}</h2>
            <div class="lesson-body" style="font-size:.85rem">${renderMd(sec.content)}</div>
          </div>
        `).join('')}
      </div>

      ${sections.length === 0 ? `
        <div class="empty"><div class="icon">⚡</div><div>暂无速查内容</div></div>
      ` : ''}
    </div>
  `;
}

// ─── 交互事件 ─────────────────────────────────────────────────────────────────

function toggleExercise(i) {
  const card = document.getElementById('ex-' + i);
  if (card) card.classList.toggle('open');
}

function toggleCollapse(id) {
  const block = document.getElementById(id);
  if (block) block.classList.toggle('open');
}

function toggleComplete(lessonId) {
  const done = isLessonDone(lessonId);
  setLessonDone(lessonId, !done);
  // 重新渲染按钮
  const btn = document.querySelector('.btn-complete');
  if (btn) {
    btn.className = 'btn-complete ' + (!done ? 'done' : '');
    btn.textContent = !done ? '✅ 已完成' : '○ 标记为完成';
  }
  // 更新侧边栏进度
  renderSidebar(location.hash.slice(1) || 'home');
}

// ─── 路由 ────────────────────────────────────────────────────────────────────

function navigate(route) {
  location.hash = '#' + route;
}

function handleRoute() {
  if (!window.LEARN_DATA) {
    document.getElementById('main').innerHTML = `
      <div class="empty">
        <div class="icon">⚠️</div>
        <div>数据文件未加载，请先运行 <code>node generate.js</code></div>
      </div>
    `;
    return;
  }

  const hash = location.hash.slice(1) || 'home';
  const parts = hash.split('/');
  const page = parts[0];

  renderSidebar(hash);
  document.getElementById('main').scrollTop = 0;

  if (page === 'home' || !page) {
    renderHome();
  } else if (page === 'path') {
    if (parts.length >= 2) {
      renderPathOverview(parts[1]);
    } else {
      renderHome();
    }
  } else if (page === 'lesson') {
    // lesson/01-getting-started/01-installation
    const lessonId = parts.slice(1).join('/');
    renderLesson(lessonId);
  } else if (page === 'practices') {
    if (parts[1] && parts[1].startsWith('tag:')) {
      renderPractices(parts[1].slice(4));
    } else {
      renderPractices();
    }
  } else if (page === 'practice') {
    renderPractice(parts[1]);
  } else if (page === 'cheatsheet') {
    renderCheatsheet();
  } else {
    renderHome();
  }
}

// ─── 初始化 ──────────────────────────────────────────────────────────────────

initTheme();
window.addEventListener('hashchange', handleRoute);
handleRoute();
</script>
