<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Superpowers Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════════════════════
   SUPERPOWERS EXPLORER — "Mission Control" aesthetic
   ════════════════════════════════════════════════════════════════════════ */

:root {
  --bg:          #08090c;
  --bg2:         #0f1117;
  --bg3:         #171a23;
  --bg4:         #1e2230;
  --border:      #252a37;
  --border-hi:   #353d52;
  --text:        #b0b8cd;
  --text-dim:    #6b7394;
  --text-bright: #e4e8f4;
  --accent:      #4d9eff;
  --accent-dim:  rgba(77,158,255,.12);
  --accent-glow: rgba(77,158,255,.25);
  --green:       #34d399;
  --green-dim:   rgba(52,211,153,.12);
  --orange:      #fb923c;
  --orange-dim:  rgba(251,146,60,.12);
  --purple:      #a78bfa;
  --purple-dim:  rgba(167,139,250,.12);
  --red:         #f87171;
  --red-dim:     rgba(248,113,113,.1);
  --yellow:      #facc15;

  --sidebar-w:   210px;
  --panel-w:     500px;
  --topbar-h:    50px;
  --radius:      8px;
  --radius-sm:   5px;
  --shadow:      0 8px 40px rgba(0,0,0,.5);
  --font-mono:   'IBM Plex Mono', 'JetBrains Mono', 'Fira Code', monospace;
  --font-body:   'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
}

[data-theme="light"] {
  --bg:          #f4f5f8;
  --bg2:         #ffffff;
  --bg3:         #e9ebf0;
  --bg4:         #dcdfe8;
  --border:      #d0d4e0;
  --border-hi:   #b8bdd0;
  --text:        #3d4663;
  --text-dim:    #7c839c;
  --text-bright: #1a1f36;
  --accent:      #2563eb;
  --accent-dim:  rgba(37,99,235,.08);
  --accent-glow: rgba(37,99,235,.15);
  --green:       #059669;
  --green-dim:   rgba(5,150,105,.08);
  --orange:      #d97706;
  --orange-dim:  rgba(217,119,6,.08);
  --purple:      #7c3aed;
  --purple-dim:  rgba(124,58,237,.08);
  --red:         #dc2626;
  --red-dim:     rgba(220,38,38,.06);
  --shadow:      0 8px 40px rgba(0,0,0,.1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

button { cursor: pointer; border: none; background: none; color: inherit; font: inherit; }
code, .mono { font-family: var(--font-mono); }

/* ─── Topbar ─────────────────────────────────────────────────────── */
#topbar {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 0 20px;
  height: var(--topbar-h);
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  position: relative;
  z-index: 20;
}

#topbar::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--accent) 50%, transparent 100%);
  opacity: .3;
}

.topbar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.topbar-icon {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  box-shadow: 0 0 12px var(--accent-glow);
}

.topbar-title {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 600;
  color: var(--text-bright);
  letter-spacing: -.3px;
}

.topbar-version {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--green);
  background: var(--green-dim);
  border: 1px solid rgba(52,211,153,.2);
  padding: 2px 8px;
  border-radius: 4px;
  letter-spacing: .5px;
}

#search-wrap {
  flex: 1;
  max-width: 420px;
  position: relative;
}

#search-wrap::before {
  content: '';
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 14px;
  height: 14px;
  border: 2px solid var(--text-dim);
  border-radius: 50%;
  pointer-events: none;
}

#search-wrap::after {
  content: '';
  position: absolute;
  left: 24px;
  top: calc(50% + 5px);
  width: 5px;
  height: 2px;
  background: var(--text-dim);
  transform: rotate(45deg);
  pointer-events: none;
}

#search-input {
  width: 100%;
  padding: 7px 14px 7px 36px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 13px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}

#search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}

#search-input::placeholder { color: var(--text-dim); }

.topbar-stats {
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
  flex-shrink: 0;
}

.stat-item {
  display: flex;
  align-items: center;
  gap: 5px;
}

.stat-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

.stat-dot.skill { background: var(--green); box-shadow: 0 0 6px var(--green-dim); }
.stat-dot.command { background: var(--accent); box-shadow: 0 0 6px var(--accent-dim); }
.stat-dot.agent { background: var(--purple); box-shadow: 0 0 6px var(--purple-dim); }

#theme-btn {
  width: 34px;
  height: 34px;
  border-radius: 6px;
  background: var(--bg3);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  transition: background .15s, border-color .15s;
  flex-shrink: 0;
}

#theme-btn:hover {
  background: var(--bg4);
  border-color: var(--border-hi);
}

/* ─── Layout ─────────────────────────────────────────────────────── */
#app {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ─── Sidebar ────────────────────────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w);
  background: var(--bg2);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
}

.nav-section { padding: 16px 0 6px; }

.nav-section-title {
  padding: 0 16px 8px;
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-dim);
}

.nav-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-dim);
  transition: all .15s;
  position: relative;
  border-left: 2px solid transparent;
}

.nav-item:hover {
  background: var(--bg3);
  color: var(--text);
}

.nav-item.active {
  background: var(--accent-dim);
  color: var(--accent);
  border-left-color: var(--accent);
}

.nav-item .icon {
  width: 16px;
  text-align: center;
  font-size: 12px;
  margin-right: 8px;
}

.nav-label {
  flex: 1;
  display: flex;
  align-items: center;
}

.nav-count {
  font-family: var(--font-mono);
  font-size: 10px;
  background: var(--bg4);
  padding: 1px 7px;
  border-radius: 10px;
  color: var(--text-dim);
  font-weight: 500;
}

.nav-item.active .nav-count {
  background: var(--accent-glow);
  color: var(--accent);
}

.sidebar-footer {
  margin-top: auto;
  padding: 14px 16px;
  border-top: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 8px;
}

.pulse-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  animation: pulse 2.5s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--green); }
  50% { opacity: .4; box-shadow: 0 0 2px var(--green); }
}

/* ─── Main content ───────────────────────────────────────────────── */
#main {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  scroll-behavior: smooth;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
}

/* ─── Cards ──────────────────────────────────────────────────────── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  cursor: pointer;
  transition: all .2s ease;
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: relative;
  overflow: hidden;
  animation: cardIn .35s ease both;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: transparent;
  transition: background .2s;
}

.card:hover {
  border-color: var(--border-hi);
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(0,0,0,.2);
}

.card:hover::before {
  background: var(--accent);
}

.card.highlighted {
  border-color: var(--green);
  box-shadow: 0 0 0 1px var(--green-dim), 0 4px 20px rgba(52,211,153,.08);
}

.card.highlighted::before {
  background: var(--green);
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.card-name {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-bright);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-type {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: .8px;
  flex-shrink: 0;
}

.card-type.skill   { background: var(--green-dim); color: var(--green); border: 1px solid rgba(52,211,153,.2); }
.card-type.command  { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(77,158,255,.2); }
.card-type.agent   { background: var(--purple-dim); color: var(--purple); border: 1px solid rgba(167,139,250,.2); }

.card-desc {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-zh {
  font-size: 12px;
  color: var(--text);
  line-height: 1.5;
  padding-top: 4px;
  border-top: 1px solid var(--border);
}

.card-keywords {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 2px;
}

.card-kw {
  font-family: var(--font-mono);
  font-size: 9px;
  padding: 1px 6px;
  border-radius: 3px;
  background: var(--bg4);
  color: var(--text-dim);
}

/* ─── Detail Panel ───────────────────────────────────────────────── */
#detail-panel {
  width: var(--panel-w);
  background: var(--bg2);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
  transform: translateX(100%);
  transition: transform .3s cubic-bezier(.4, 0, .2, 1);
  position: relative;
}

#detail-panel.open { transform: translateX(0); }

.panel-header {
  position: sticky;
  top: 0;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 10;
  backdrop-filter: blur(8px);
}

.panel-header-title {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-bright);
}

.panel-close-btn {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--text-dim);
  transition: all .15s;
}

.panel-close-btn:hover {
  background: var(--bg4);
  color: var(--text);
}

#panel-content { padding: 20px; }

.panel-name {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 700;
  color: var(--text-bright);
  margin-bottom: 6px;
  letter-spacing: -.3px;
}

.panel-type-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: .8px;
  margin-bottom: 16px;
}

.panel-section {
  margin-bottom: 20px;
  animation: sectionIn .3s ease both;
}

@keyframes sectionIn {
  from { opacity: 0; transform: translateX(6px); }
  to { opacity: 1; transform: translateX(0); }
}

.panel-section-title {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.panel-section-title::before {
  content: '';
  width: 3px;
  height: 12px;
  border-radius: 2px;
  background: var(--accent);
  flex-shrink: 0;
}

.panel-summary {
  font-size: 13px;
  color: var(--text);
  line-height: 1.8;
}

.panel-keypoints {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.panel-keypoints li {
  font-size: 12px;
  color: var(--text);
  padding: 8px 12px;
  background: var(--bg3);
  border-radius: var(--radius-sm);
  border-left: 2px solid var(--accent);
  line-height: 1.5;
}

.hard-gate {
  background: var(--red-dim);
  border: 1px solid rgba(248,113,113,.2);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 16px;
}

.hard-gate-title {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--red);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.hard-gate-body {
  font-size: 12px;
  color: var(--orange);
  line-height: 1.6;
}

/* ─── Raw content toggle ─────────────────────────────────────────── */
details { margin-top: 12px; }

details summary {
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--accent);
  padding: 8px 0;
  user-select: none;
  transition: color .15s;
}

details summary:hover { color: var(--text-bright); }

details[open] summary { margin-bottom: 8px; }

.raw-content {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
  white-space: pre-wrap;
  word-break: break-word;
  background: var(--bg3);
  padding: 14px;
  border-radius: var(--radius);
  max-height: 450px;
  overflow-y: auto;
  line-height: 1.7;
  border: 1px solid var(--border);
}

/* ─── Workflow view ──────────────────────────────────────────────── */
#workflow-view {
  padding: 0;
  display: none;
}

#workflow-view.active { display: block; }

#workflow-svg-container {
  overflow: auto;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
}

/* ─── Empty state ────────────────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-dim);
}

.empty-state h3 {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--text);
}

.empty-state p {
  font-size: 13px;
  line-height: 1.6;
}

.empty-state code {
  font-size: 12px;
  background: var(--bg3);
  padding: 3px 8px;
  border-radius: 4px;
  color: var(--accent);
}

/* ─── Scrollbar ──────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-hi); }

/* ─── Noise overlay for depth ────────────────────────────────────── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 100;
  opacity: .015;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 200px 200px;
}
</style>
<script src="data.js"></script>
</head>
<body>

<!-- Topbar -->
<header id="topbar">
  <div class="topbar-brand">
    <div class="topbar-icon">&#x26A1;</div>
    <span class="topbar-title">Superpowers Explorer</span>
    <span class="topbar-version" id="version-badge">v?.?.?</span>
  </div>
  <div id="search-wrap">
    <input id="search-input" type="text" placeholder="搜索技能... 试试输入你正在做的事" />
  </div>
  <div class="topbar-stats">
    <span class="stat-item"><span class="stat-dot skill"></span> <span id="stat-skills">0</span> skills</span>
    <span class="stat-item"><span class="stat-dot command"></span> <span id="stat-commands">0</span> cmds</span>
    <span class="stat-item"><span class="stat-dot agent"></span> <span id="stat-agents">0</span> agents</span>
  </div>
  <button id="theme-btn" onclick="toggleTheme()" title="切换主题">&#x2600;&#xFE0F;</button>
</header>

<!-- Main layout -->
<div id="app">
  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="nav-section">
      <div class="nav-section-title">Components</div>
      <div class="nav-item active" data-filter="skills" onclick="setFilter('skills')">
        <span class="nav-label"><span class="icon">&#x2726;</span> Skills</span>
        <span class="nav-count" id="count-skills">0</span>
      </div>
      <div class="nav-item" data-filter="commands" onclick="setFilter('commands')">
        <span class="nav-label"><span class="icon">&#x276F;</span> Commands</span>
        <span class="nav-count" id="count-commands">0</span>
      </div>
      <div class="nav-item" data-filter="agents" onclick="setFilter('agents')">
        <span class="nav-label"><span class="icon">&#x2B21;</span> Agents</span>
        <span class="nav-count" id="count-agents">0</span>
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-section-title">Visualize</div>
      <div class="nav-item" data-filter="workflow" onclick="setFilter('workflow')">
        <span class="nav-label"><span class="icon">&#x2B95;</span> Workflow Map</span>
      </div>
    </div>
    <div class="sidebar-footer">
      <span class="pulse-dot"></span>
      <span>Superpowers online</span>
    </div>
  </nav>

  <!-- Main content -->
  <div id="main">
    <div class="grid" id="card-grid"></div>
    <div id="workflow-view">
      <div id="workflow-svg-container">
        <svg id="workflow-svg" width="900" height="600"></svg>
      </div>
    </div>
  </div>

  <!-- Detail panel -->
  <aside id="detail-panel">
    <div class="panel-header">
      <span class="panel-header-title" id="panel-title"></span>
      <button class="panel-close-btn" onclick="closePanel()" title="关闭">&#x2715;</button>
    </div>
    <div id="panel-content"></div>
  </aside>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════════════════

if (typeof window.SP_DATA === 'undefined') {
  document.getElementById('card-grid').innerHTML =
    '<div class="empty-state"><h3>&#x26A0; 数据未加载</h3><p>请先运行：<code>node superpowers-explorer/generate.js</code></p></div>';
}

let currentFilter = 'skills';
let searchQuery = '';
let selectedItem = null;
const DATA = window.SP_DATA || { skills: [], commands: [], agents: [], workflow: { nodes: [], edges: [] }, meta: {} };

// ═══════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════

function init() {
  document.getElementById('version-badge').textContent = 'v' + (DATA.meta.version || '?');
  document.getElementById('count-skills').textContent = DATA.skills.length;
  document.getElementById('count-commands').textContent = DATA.commands.length;
  document.getElementById('count-agents').textContent = DATA.agents.length;
  document.getElementById('stat-skills').textContent = DATA.skills.length;
  document.getElementById('stat-commands').textContent = DATA.commands.length;
  document.getElementById('stat-agents').textContent = DATA.agents.length;
  renderCards();

  const saved = localStorage.getItem('sp-theme') || 'dark';
  if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
  document.getElementById('theme-btn').textContent = saved === 'light' ? '\u{1F319}' : '\u{2600}\u{FE0F}';
}

// ═══════════════════════════════════════════════════════════════════════
// FILTER & RENDER
// ═══════════════════════════════════════════════════════════════════════

function setFilter(filter) {
  currentFilter = filter;
  searchQuery = document.getElementById('search-input').value;
  document.querySelectorAll('.nav-item').forEach(el =>
    el.classList.toggle('active', el.dataset.filter === filter)
  );
  const grid = document.getElementById('card-grid');
  const wf = document.getElementById('workflow-view');
  if (filter === 'workflow') {
    grid.style.display = 'none';
    wf.classList.add('active');
    renderWorkflow();
  } else {
    grid.style.display = '';
    wf.classList.remove('active');
    renderCards();
  }
}

function getItems() {
  if (currentFilter === 'skills') return DATA.skills.map(s => ({ ...s, _type: 'skill' }));
  if (currentFilter === 'commands') return DATA.commands.map(c => ({ ...c, _type: 'command' }));
  if (currentFilter === 'agents') return DATA.agents.map(a => ({ ...a, _type: 'agent' }));
  return [];
}

function renderCards() {
  const items = getItems();
  const q = searchQuery.toLowerCase().trim();
  const grid = document.getElementById('card-grid');

  if (!items.length) {
    grid.innerHTML = '<div class="empty-state"><h3>&#x1F4ED; 暂无数据</h3><p>此分类下没有项目。</p></div>';
    return;
  }

  const scored = items.map(item => {
    let score = 0;
    if (q.length >= 2) {
      const keywords = item.keywords || [];
      const descMatch = (item.description || '').toLowerCase().includes(q);
      const nameMatch = item.id.toLowerCase().includes(q);
      const zhMatch = item.zh && item.zh.summary ? item.zh.summary.toLowerCase().includes(q) : false;
      const keywordMatch = keywords.some(k => k.includes(q) || q.includes(k));
      if (keywordMatch) score += 3;
      if (zhMatch) score += 2;
      if (descMatch) score += 2;
      if (nameMatch) score += 1;
    }
    return { ...item, _score: score };
  });

  // Sort: highlighted first, then alphabetical
  scored.sort((a, b) => {
    if (a._score !== b._score) return b._score - a._score;
    return a.id.localeCompare(b.id);
  });

  grid.innerHTML = scored.map((item, i) => {
    const highlighted = q.length >= 2 && item._score > 0;
    const zhDesc = item.zh && item.zh.summary ? item.zh.summary : '';
    const kws = (item.keywords || []).slice(0, 4);
    return `<div class="card${highlighted ? ' highlighted' : ''}" style="animation-delay:${i * 30}ms"
      onclick='openPanel(${JSON.stringify(item).replace(/'/g, "&#39;")})'>
      <div class="card-header">
        <span class="card-name">${esc(item.id)}</span>
        <span class="card-type ${item._type}">${item._type}</span>
      </div>
      <div class="card-desc">${esc(item.description || '')}</div>
      ${zhDesc ? `<div class="card-zh">${esc(zhDesc)}</div>` : ''}
      ${kws.length ? `<div class="card-keywords">${kws.map(k => `<span class="card-kw">${esc(k)}</span>`).join('')}</div>` : ''}
    </div>`;
  }).join('');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ═══════════════════════════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════════════════════════

document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value;
  if (currentFilter !== 'workflow') renderCards();
});

// ═══════════════════════════════════════════════════════════════════════
// DETAIL PANEL
// ═══════════════════════════════════════════════════════════════════════

function openPanel(item) {
  selectedItem = item;
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('panel-content');
  document.getElementById('panel-title').textContent = item.id;

  const typeColors = { skill: 'var(--green)', command: 'var(--accent)', agent: 'var(--purple)' };
  const typeBg = { skill: 'var(--green-dim)', command: 'var(--accent-dim)', agent: 'var(--purple-dim)' };
  const typeLabel = item._type || 'skill';

  let html = `
    <div class="panel-name">${esc(item.id)}</div>
    <span class="panel-type-badge" style="background:${typeBg[typeLabel]};color:${typeColors[typeLabel]};border:1px solid">${typeLabel}</span>
  `;

  // English description
  html += `
    <div class="panel-section" style="animation-delay:.05s">
      <div class="panel-section-title">Description</div>
      <div class="panel-summary" style="color:var(--text-dim);font-size:12px">${esc(item.description || '\u2014')}</div>
    </div>
  `;

  // Chinese content
  if (item.zh) {
    html += `
      <div class="panel-section" style="animation-delay:.1s">
        <div class="panel-section-title">\u4E2D\u6587\u8BF4\u660E</div>
        <div class="panel-summary">${esc(item.zh.summary || '')}</div>
      </div>
    `;
    if (item.zh.keyPoints && item.zh.keyPoints.length) {
      html += `
        <div class="panel-section" style="animation-delay:.15s">
          <div class="panel-section-title">\u6838\u5FC3\u8981\u70B9</div>
          <ul class="panel-keypoints">
            ${item.zh.keyPoints.map(p => `<li>${esc(p)}</li>`).join('')}
          </ul>
        </div>
      `;
    }
    if (item.zh.whenToUse) {
      html += `
        <div class="panel-section" style="animation-delay:.2s">
          <div class="panel-section-title">\u4F55\u65F6\u4F7F\u7528</div>
          <div class="panel-summary">${esc(item.zh.whenToUse)}</div>
        </div>
      `;
    }
    if (item.zh.tips) {
      html += `
        <div class="panel-section" style="animation-delay:.25s">
          <div class="panel-section-title">\u5B9E\u7528\u6280\u5DE7</div>
          <div class="panel-summary">${esc(item.zh.tips)}</div>
        </div>
      `;
    }
  } else {
    html += `<div style="color:var(--text-dim);font-size:12px;padding:8px 0">\u5C1A\u65E0\u4E2D\u6587\u7FFB\u8BD1\u3002\u8FD0\u884C translate.js \u751F\u6210\u3002</div>`;
  }

  // Hard gate warning
  if (item.hardGate) {
    html += `
      <div class="hard-gate">
        <div class="hard-gate-title">\u26D4 HARD GATE</div>
        <div class="hard-gate-body">${esc(item.hardGate.slice(0, 400))}${item.hardGate.length > 400 ? '\u2026' : ''}</div>
      </div>
    `;
  }

  // When to use (raw)
  if (item.whenToUse) {
    html += `
      <div class="panel-section">
        <div class="panel-section-title">When to Use</div>
        <div class="panel-summary" style="font-size:12px;color:var(--text-dim)">${esc(item.whenToUse.slice(0, 500))}${item.whenToUse.length > 500 ? '\u2026' : ''}</div>
      </div>
    `;
  }

  // Raw content
  html += `
    <details>
      <summary>\u{1F4C4} \u67E5\u770B\u539F\u6587\uFF08\u82F1\u6587\uFF09</summary>
      <div class="raw-content">${esc(item.raw || '')}</div>
    </details>
  `;

  content.innerHTML = html;
  panel.classList.add('open');
}

function closePanel() {
  document.getElementById('detail-panel').classList.remove('open');
  selectedItem = null;
}

// Close panel on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && selectedItem) closePanel();
});

// ═══════════════════════════════════════════════════════════════════════
// THEME
// ═══════════════════════════════════════════════════════════════════════

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('theme-btn').textContent = next === 'light' ? '\u{1F319}' : '\u{2600}\u{FE0F}';
  localStorage.setItem('sp-theme', next);
}

// ═══════════════════════════════════════════════════════════════════════
// WORKFLOW MAP
// ═══════════════════════════════════════════════════════════════════════

function renderWorkflow() {
  const svg = document.getElementById('workflow-svg');
  const NODES = DATA.workflow.nodes;
  const EDGES = DATA.workflow.edges;

  const LAYOUT = {
    'using-superpowers':              { x: 450, y: 40 },
    'brainstorming':                  { x: 450, y: 120 },
    'using-git-worktrees':            { x: 750, y: 190 },
    'writing-plans':                  { x: 450, y: 200 },
    'subagent-driven-development':    { x: 320, y: 300 },
    'executing-plans':                { x: 620, y: 300 },
    'dispatching-parallel-agents':    { x: 120, y: 300 },
    'test-driven-development':        { x: 120, y: 390 },
    'systematic-debugging':           { x: 750, y: 390 },
    'requesting-code-review':         { x: 450, y: 400 },
    'receiving-code-review':          { x: 720, y: 480 },
    'verification-before-completion': { x: 450, y: 490 },
    'writing-skills':                 { x: 750, y: 490 },
    'finishing-a-development-branch': { x: 450, y: 575 },
  };

  const TYPE_COLORS = {
    main:    { fill: 'rgba(52,211,153,.08)', stroke: '#34d399', text: '#34d399' },
    alt:     { fill: 'rgba(77,158,255,.08)', stroke: '#4d9eff', text: '#4d9eff' },
    support: { fill: 'rgba(107,115,148,.06)', stroke: '#6b7394', text: '#8b93aa' },
    debug:   { fill: 'rgba(251,146,60,.08)', stroke: '#fb923c', text: '#fb923c' },
    meta:    { fill: 'rgba(167,139,250,.08)', stroke: '#a78bfa', text: '#a78bfa' },
  };

  const EDGE_COLORS = {
    main: '#34d399', alt: '#4d9eff', support: '#6b7394', debug: '#fb923c'
  };

  const NW = 190, NH = 38;

  const defs = `<defs>
    ${['main','alt','support','debug'].map(t => `
      <marker id="arrow-${t}" viewBox="0 0 10 10" refX="8" refY="5"
        markerWidth="6" markerHeight="6" orient="auto">
        <path d="M 0 1 L 8 5 L 0 9 z" fill="${EDGE_COLORS[t]}" opacity=".8"/>
      </marker>`).join('')}
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>`;

  const edges = EDGES.map(e => {
    const from = LAYOUT[e.from];
    const to = LAYOUT[e.to];
    if (!from || !to) return '';
    const color = EDGE_COLORS[e.type] || EDGE_COLORS.support;
    const x1 = from.x, y1 = from.y + NH / 2;
    const x2 = to.x, y2 = to.y - NH / 2;
    const cy = (y1 + y2) / 2;
    const d = `M ${x1} ${y1} C ${x1} ${cy}, ${x2} ${cy}, ${x2} ${y2}`;
    const isDashed = e.type === 'support' || e.type === 'alt';
    return `<path d="${d}" fill="none" stroke="${color}" stroke-width="1.5"
      ${isDashed ? 'stroke-dasharray="6,4"' : ''} stroke-linecap="round"
      marker-end="url(#arrow-${e.type})" opacity="0.6"/>
      <text x="${(x1 + x2) / 2 + (x1 === x2 ? 8 : 0)}" y="${cy}" fill="${color}"
        font-family="'IBM Plex Mono',monospace" font-size="9" opacity="0.7"
        text-anchor="${x1 === x2 ? 'start' : 'middle'}"
        dy="${x1 === x2 ? 0 : -4}">${e.label}</text>`;
  }).join('');

  const nodes = NODES.map(n => {
    const pos = LAYOUT[n.id];
    if (!pos) return '';
    const colors = TYPE_COLORS[n.type] || TYPE_COLORS.support;
    const x = pos.x - NW / 2, y = pos.y - NH / 2;
    return `<g class="wf-node" style="cursor:pointer" onclick="onWorkflowNodeClick('${n.id}')">
      <rect x="${x}" y="${y}" width="${NW}" height="${NH}" rx="6"
        fill="${colors.fill}" stroke="${colors.stroke}" stroke-width="1.2"/>
      <text x="${pos.x}" y="${pos.y + 4}" text-anchor="middle" fill="${colors.text}"
        font-size="11" font-weight="500"
        font-family="'IBM Plex Mono',monospace">${n.id}</text>
    </g>`;
  }).join('');

  const legend = `<g transform="translate(20, 530)" font-family="'IBM Plex Mono',monospace">
    <text fill="#6b7394" font-size="10" font-weight="600" letter-spacing=".8px">LEGEND</text>
    ${[
      { color: '#34d399', label: '\u9EC4\u91D1\u8DEF\u5F84', dash: false },
      { color: '#4d9eff', label: '\u66FF\u4EE3\u8DEF\u5F84', dash: true },
      { color: '#6b7394', label: '\u652F\u6301\u6280\u80FD', dash: true },
      { color: '#fb923c', label: '\u8C03\u8BD5\u652F\u7EBF', dash: false },
    ].map((l, i) => `
      <line x1="0" y1="${20 + i * 20}" x2="28" y2="${20 + i * 20}"
        stroke="${l.color}" stroke-width="2" stroke-linecap="round"
        ${l.dash ? 'stroke-dasharray="6,4"' : ''}/>
      <text x="36" y="${24 + i * 20}" fill="${l.color}" font-size="10">${l.label}</text>
    `).join('')}
  </g>`;

  svg.innerHTML = defs + edges + nodes + legend;
  svg.setAttribute('viewBox', '0 0 900 640');
  svg.setAttribute('width', '900');
  svg.setAttribute('height', '640');
}

function onWorkflowNodeClick(skillId) {
  const item = DATA.skills.find(s => s.id === skillId);
  if (item) openPanel({ ...item, _type: 'skill' });
}

// ═══════════════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════════════

init();
</script>
</body>
</html>
