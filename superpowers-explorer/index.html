<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Superpowers Explorer</title>
<style>
:root {
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;
  --text:#c9d1d9;--text-dim:#8b949e;--text-bright:#f0f6fc;
  --accent:#58a6ff;--accent2:#3fb950;--accent3:#f78166;
  --accent4:#d2a8ff;--accent5:#ffa657;--accent6:#79c0ff;
  --tag-bg:#1f2d3d;--sidebar-w:200px;--panel-w:480px;
  --radius:8px;--shadow:0 8px 32px rgba(0,0,0,.4);
}
[data-theme="light"] {
  --bg:#f6f8fa;--bg2:#ffffff;--bg3:#eaeef2;--border:#d0d7de;
  --text:#24292f;--text-dim:#57606a;--text-bright:#1f2328;
  --tag-bg:#ddf4ff;--shadow:0 8px 32px rgba(0,0,0,.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);line-height:1.6;height:100vh;
  display:flex;flex-direction:column;overflow:hidden}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit}
code{font-family:'JetBrains Mono','Fira Code',monospace;font-size:.88em}

/* 顶栏 */
#topbar{display:flex;align-items:center;gap:12px;padding:0 16px;
  height:52px;background:var(--bg2);border-bottom:1px solid var(--border);
  flex-shrink:0}
#topbar h1{font-size:15px;font-weight:600;color:var(--text-bright);white-space:nowrap}
#topbar .version{font-size:11px;color:var(--text-dim);
  background:var(--bg3);padding:2px 6px;border-radius:4px}
#search-input{flex:1;max-width:400px;padding:6px 12px;
  background:var(--bg3);border:1px solid var(--border);border-radius:6px;
  color:var(--text);font-size:13px;outline:none}
#search-input:focus{border-color:var(--accent)}
#search-input::placeholder{color:var(--text-dim)}
#theme-btn{padding:4px 8px;border-radius:6px;font-size:14px;
  background:var(--bg3);border:1px solid var(--border)}

/* 主体 */
#app{display:flex;flex:1;overflow:hidden}

/* 侧边栏 */
#sidebar{width:var(--sidebar-w);background:var(--bg2);
  border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
.nav-section{padding:12px 0 4px}
.nav-section-title{padding:4px 16px;font-size:10px;text-transform:uppercase;
  letter-spacing:.8px;color:var(--text-dim);font-weight:600}
.nav-item{display:flex;align-items:center;justify-content:space-between;
  padding:6px 16px;cursor:pointer;font-size:13px;color:var(--text-dim);
  transition:background .15s,color .15s}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--bg3);color:var(--accent);font-weight:500}
.nav-count{font-size:11px;background:var(--tag-bg);
  padding:1px 6px;border-radius:10px;color:var(--text-dim)}

/* 主内容 */
#main{flex:1;overflow-y:auto;padding:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}

/* 卡片 */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;cursor:pointer;transition:border-color .15s,transform .1s;
  display:flex;flex-direction:column;gap:6px}
.card:hover{border-color:var(--accent);transform:translateY(-1px)}
.card.highlighted{border-color:var(--accent2);box-shadow:0 0 0 2px rgba(63,185,80,.2)}
.card-header{display:flex;align-items:center;justify-content:space-between}
.card-name{font-size:13px;font-weight:600;color:var(--text-bright);
  font-family:'JetBrains Mono','Fira Code',monospace}
.card-type{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.card-type.skill{background:#1f3d2a;color:var(--accent2)}
.card-type.command{background:#1f2d3d;color:var(--accent)}
.card-type.agent{background:#2d1f3d;color:var(--accent4)}
.card-desc{font-size:12px;color:var(--text-dim);line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-zh{font-size:12px;color:var(--text);font-style:italic}

/* 详情面板 */
#detail-panel{width:var(--panel-w);background:var(--bg2);
  border-left:1px solid var(--border);overflow-y:auto;
  transform:translateX(100%);transition:transform .25s ease;flex-shrink:0}
#detail-panel.open{transform:translateX(0)}
#panel-close{position:sticky;top:0;width:100%;padding:10px 16px;
  background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;z-index:10}
#panel-close button{font-size:18px;color:var(--text-dim)}
#panel-content{padding:16px}
.panel-name{font-size:16px;font-weight:700;color:var(--text-bright);
  font-family:'JetBrains Mono',monospace;margin-bottom:4px}
.panel-type-badge{display:inline-block;font-size:11px;padding:2px 8px;
  border-radius:10px;margin-bottom:12px}
.panel-section{margin-bottom:16px}
.panel-section-title{font-size:11px;font-weight:600;color:var(--text-dim);
  text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.panel-summary{font-size:13px;color:var(--text);line-height:1.7}
.panel-keypoints{list-style:none;display:flex;flex-direction:column;gap:4px}
.panel-keypoints li{font-size:12px;color:var(--text);padding:4px 10px;
  background:var(--bg3);border-radius:4px}
.panel-keypoints li::before{content:'·  ';color:var(--accent)}
.hard-gate{background:#2d1010;border:1px solid #5a1a1a;border-radius:6px;
  padding:10px 12px;font-size:12px;color:#f78166;margin-bottom:12px}
.hard-gate-title{font-weight:700;margin-bottom:4px}

/* 原文折叠 */
details{margin-top:8px}
details summary{cursor:pointer;font-size:12px;color:var(--accent);
  padding:6px 0;user-select:none}
.raw-content{font-size:11px;color:var(--text-dim);
  white-space:pre-wrap;word-break:break-word;
  background:var(--bg3);padding:12px;border-radius:6px;margin-top:8px;
  max-height:400px;overflow-y:auto}

/* 工作流视图 */
#workflow-view{padding:16px;display:none}
#workflow-view.active{display:block}
#workflow-svg-container{overflow:auto;background:var(--bg2);
  border:1px solid var(--border);border-radius:var(--radius);padding:20px}

/* 空态 */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-dim)}
.empty-state h3{font-size:15px;margin-bottom:8px;color:var(--text)}

/* 滚动条 */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<!-- 顶栏 -->
<div id="topbar">
  <h1>⚡ Superpowers Explorer</h1>
  <span class="version" id="version-badge">v?.?.?</span>
  <input id="search-input" type="text" placeholder="🔍 情景搜索：我正在做什么？（如：debug bug / 写计划 / code review）" />
  <button id="theme-btn" onclick="toggleTheme()">☀️</button>
</div>

<!-- 主体 -->
<div id="app">
  <!-- 侧边栏 -->
  <nav id="sidebar">
    <div class="nav-section">
      <div class="nav-section-title">组件</div>
      <div class="nav-item active" data-filter="skills" onclick="setFilter('skills')">
        Skills <span class="nav-count" id="count-skills">0</span>
      </div>
      <div class="nav-item" data-filter="commands" onclick="setFilter('commands')">
        Commands <span class="nav-count" id="count-commands">0</span>
      </div>
      <div class="nav-item" data-filter="agents" onclick="setFilter('agents')">
        Agents <span class="nav-count" id="count-agents">0</span>
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-section-title">可视化</div>
      <div class="nav-item" data-filter="workflow" onclick="setFilter('workflow')">
        🗺️ 工作流地图
      </div>
    </div>
  </nav>

  <!-- 主内容 -->
  <div id="main">
    <div class="grid" id="card-grid"></div>
    <div id="workflow-view">
      <div id="workflow-svg-container">
        <svg id="workflow-svg" width="900" height="600"></svg>
      </div>
    </div>
  </div>

  <!-- 详情面板 -->
  <aside id="detail-panel">
    <div id="panel-close">
      <span id="panel-title" style="font-size:13px;font-weight:600;color:var(--text-bright)"></span>
      <button onclick="closePanel()">✕</button>
    </div>
    <div id="panel-content"></div>
  </aside>
</div>

<script>
// ─── 数据检查 ────────────────────────────────────────────────────────────────
if (typeof window.SP_DATA === 'undefined') {
  document.getElementById('card-grid').innerHTML =
    '<div class="empty-state"><h3>⚠️ 数据未加载</h3><p>请先运行：<code>node superpowers-explorer/generate.js</code></p></div>';
}

// ─── 状态 ──────────────────────────────────────────────────────────────────
let currentFilter = 'skills';
let searchQuery = '';
let selectedItem = null;
const DATA = window.SP_DATA || { skills: [], commands: [], agents: [], workflow: { nodes: [], edges: [] }, meta: {} };

// ─── 初始化 ────────────────────────────────────────────────────────────────
function init() {
  document.getElementById('version-badge').textContent = 'v' + (DATA.meta.version || '?');
  document.getElementById('count-skills').textContent = DATA.skills.length;
  document.getElementById('count-commands').textContent = DATA.commands.length;
  document.getElementById('count-agents').textContent = DATA.agents.length;
  renderCards();
  // 主题
  const saved = localStorage.getItem('sp-theme') || 'dark';
  if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
  document.getElementById('theme-btn').textContent = saved === 'light' ? '🌙' : '☀️';
}

// ─── 过滤与渲染 ──────────────────────────────────────────────────────────────
function setFilter(filter) {
  currentFilter = filter;
  searchQuery = document.getElementById('search-input').value;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.filter === filter));
  const grid = document.getElementById('card-grid');
  const wf = document.getElementById('workflow-view');
  if (filter === 'workflow') {
    grid.style.display = 'none';
    wf.classList.add('active');
    renderWorkflow();
  } else {
    grid.style.display = '';
    wf.classList.remove('active');
    renderCards();
  }
}

function getItems() {
  if (currentFilter === 'skills') return DATA.skills.map(s => ({ ...s, _type: 'skill' }));
  if (currentFilter === 'commands') return DATA.commands.map(c => ({ ...c, _type: 'command' }));
  if (currentFilter === 'agents') return DATA.agents.map(a => ({ ...a, _type: 'agent' }));
  return [];
}

function renderCards() {
  const items = getItems();
  const q = searchQuery.toLowerCase().trim();
  const grid = document.getElementById('card-grid');

  if (!items.length) {
    grid.innerHTML = '<div class="empty-state"><h3>暂无数据</h3></div>';
    return;
  }

  // 情景推荐：计算匹配分数
  const scored = items.map(item => {
    let score = 0;
    if (q.length >= 2) {
      const keywords = item.keywords || [];
      const descMatch = (item.description || '').toLowerCase().includes(q);
      const nameMatch = item.id.includes(q);
      const keywordMatch = keywords.some(k => k.includes(q) || q.includes(k));
      if (keywordMatch) score += 3;
      if (descMatch) score += 2;
      if (nameMatch) score += 1;
    }
    return { ...item, _score: score };
  });

  grid.innerHTML = scored.map(item => {
    const highlighted = q.length >= 2 && item._score > 0;
    const zhDesc = item.zh && item.zh.summary ? item.zh.summary.slice(0, 60) + '…' : '';
    return `<div class="card${highlighted ? ' highlighted' : ''}"
      onclick='openPanel(${JSON.stringify(item)})'>
      <div class="card-header">
        <span class="card-name">${item.id}</span>
        <span class="card-type ${item._type}">${item._type}</span>
      </div>
      <div class="card-desc">${item.description || ''}</div>
      ${zhDesc ? `<div class="card-zh">${zhDesc}</div>` : ''}
    </div>`;
  }).join('');
}

// ─── 搜索 ──────────────────────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value;
  if (currentFilter !== 'workflow') renderCards();
});

// ─── 详情面板 ────────────────────────────────────────────────────────────────
function openPanel(item) {
  selectedItem = item;
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('panel-content');
  document.getElementById('panel-title').textContent = item.id;

  const typeColors = { skill: 'var(--accent2)', command: 'var(--accent)', agent: 'var(--accent4)' };
  const typeBg = { skill: '#1f3d2a', command: '#1f2d3d', agent: '#2d1f3d' };
  const typeLabel = item._type || 'skill';

  let html = `
    <div class="panel-name">${item.id}</div>
    <span class="panel-type-badge" style="background:${typeBg[typeLabel]};color:${typeColors[typeLabel]}">${typeLabel}</span>
    <div class="panel-section">
      <div class="panel-section-title">📋 英文描述</div>
      <div class="panel-summary" style="color:var(--text-dim);font-size:12px">${item.description || '—'}</div>
    </div>
  `;

  if (item.zh) {
    html += `
      <div class="panel-section">
        <div class="panel-section-title">📖 中文说明</div>
        <div class="panel-summary">${item.zh.summary || ''}</div>
      </div>
    `;
    if (item.zh.keyPoints && item.zh.keyPoints.length) {
      html += `
        <div class="panel-section">
          <div class="panel-section-title">✨ 核心要点</div>
          <ul class="panel-keypoints">
            ${item.zh.keyPoints.map(p => `<li>${p}</li>`).join('')}
          </ul>
        </div>
      `;
    }
    if (item.zh.whenToUse) {
      html += `
        <div class="panel-section">
          <div class="panel-section-title">⏰ 何时使用</div>
          <div class="panel-summary">${item.zh.whenToUse}</div>
        </div>
      `;
    }
    if (item.zh.tips) {
      html += `
        <div class="panel-section">
          <div class="panel-section-title">💡 实用技巧</div>
          <div class="panel-summary">${item.zh.tips}</div>
        </div>
      `;
    }
  } else {
    html += `<div style="color:var(--text-dim);font-size:12px;padding:8px 0">尚无中文翻译。运行 translate.js 生成。</div>`;
  }

  if (item.hardGate) {
    html += `
      <div class="hard-gate">
        <div class="hard-gate-title">🚫 HARD GATE</div>
        <div>${item.hardGate.slice(0, 300)}${item.hardGate.length > 300 ? '…' : ''}</div>
      </div>
    `;
  }

  if (item.whenToUse) {
    html += `
      <div class="panel-section">
        <div class="panel-section-title">📌 When to Use（原文）</div>
        <div class="panel-summary" style="font-size:12px;color:var(--text-dim)">${item.whenToUse.slice(0, 400)}${item.whenToUse.length > 400 ? '…' : ''}</div>
      </div>
    `;
  }

  html += `
    <details>
      <summary>📄 查看原文（英文）</summary>
      <div class="raw-content">${(item.raw || '').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
    </details>
  `;

  content.innerHTML = html;
  panel.classList.add('open');
}

function closePanel() {
  document.getElementById('detail-panel').classList.remove('open');
  selectedItem = null;
}

// ─── 主题 ──────────────────────────────────────────────────────────────────
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('theme-btn').textContent = next === 'light' ? '🌙' : '☀️';
  localStorage.setItem('sp-theme', next);
}

// ─── 工作流地图（Task 4 实现）──────────────────────────────────────────────
function renderWorkflow() {
  // Task 4 中实现
  const svg = document.getElementById('workflow-svg');
  svg.innerHTML = '<text x="50" y="50" fill="#8b949e" font-size="14">工作流地图加载中...</text>';
}

function onWorkflowNodeClick(skillId) {
  const item = DATA.skills.find(s => s.id === skillId);
  if (item) {
    openPanel({ ...item, _type: 'skill' });
  }
}

init();
</script>
</body>
</html>
